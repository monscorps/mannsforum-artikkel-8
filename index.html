    // ============ COUNTER ANIMATION ============
    // Uses setTimeout instead of requestAnimationFrame so it keeps running
    // even when iframe is throttled by the browser.
    function animateCounter(el) {
      const target = el.dataset.num;
      const match = target.match(/^([0-9]+)(.*)$/);
      if (!match) { el.textContent = target; return; }
      const targetNum = parseInt(match[1], 10);
      const suffix = match[2];
      const duration = 1400;
      const steps = 30;
      const stepDuration = duration / steps;
      let frame = 0;
      function tick() {
        frame += 1;
        const progress = Math.min(frame / steps, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.floor(eased * targetNum) + suffix;
        if (progress < 1) setTimeout(tick, stepDuration);
        else el.textContent = target;
      }
      setTimeout(tick, stepDuration);
    }

    // ============ SEARCH ============
    let searchIndex = [];
    let searchFocusedIndex = -1;

    function stripTags(s) { return String(s).replace(/<[^>]+>/g, ''); }
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    // Diacritic-insensitive normalize: "Ribić" -> "ribic", "Ónodi" -> "onodi"
    function deburr(s) {
      return String(s).normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
    }

    function buildSearchIndex() {
      const lang = currentLang;
      const T = content[lang];
      const idx = [];

      cases.forEach((c, i) => {
        idx.push({
          type: 'case',
          typeLabel: T.search_type_case,
          icon: 'i-gavel',
          sectionId: 'ch3',
          elementId: `case-${i}`,
          expand: true,
          title: lang === 'no'
            ? `${c.name} mot ${c.country.no} (${c.year})`
            : `${c.name} v. ${c.country.en} (${c.year})`,
          body: `${c.principle[lang]} ${c.quote[lang]} ${c.appNo}`
        });
      });

      principles.forEach((p) => {
        idx.push({
          type: 'principle',
          typeLabel: T.search_type_principle,
          icon: p.icon,
          sectionId: 'ch2',
          title: p[lang].title,
          body: p[lang].body
        });
      });

      norwayRecord.forEach((s) => {
        idx.push({
          type: 'norway',
          typeLabel: T.search_type_norway,
          icon: 'i-flag',
          sectionId: 'ch6',
          title: `${s.num} · ${stripTags(s[lang].label).substring(0, 60)}${s[lang].label.length > 60 ? '…' : ''}`,
          body: `${stripTags(s[lang].label)} ${s[lang].source}`
        });
      });

      compare.forEach((c) => {
        const s = stripTags(c[lang].standard);
        const p = stripTags(c[lang].practice);
        idx.push({
          type: 'compare',
          typeLabel: T.search_type_compare,
          icon: 'i-balance',
          sectionId: 'ch5',
          title: s.substring(0, 80) + (s.length > 80 ? '…' : ''),
          body: `${s} ${p}`
        });
      });

      sources.forEach((s) => {
        idx.push({
          type: 'source',
          typeLabel: T.search_type_source,
          icon: s.icon,
          sectionId: 'ch7',
          external: s.url,
          title: s[lang].title,
          body: `${s[lang].title} ${s[lang].desc}`
        });
      });

      glossary.forEach((g) => {
        const localTerm = lang === 'en' ? (g.en.term || g.term) : g.term;
        idx.push({
          type: 'glossary',
          typeLabel: T.search_type_glossary || 'Term',
          icon: 'i-book-open',
          openDrawer: true,
          title: localTerm,
          body: `${localTerm} ${g[lang].def}`
        });
      });

      searchIndex = idx;
    }

    function searchQuery(query) {
      const q = deburr(query).trim();
      if (!q) return [];
      const tokens = q.split(/\s+/).filter(t => t.length > 0);

      return searchIndex
        .map(item => {
          const titleL = deburr(item.title);
          const bodyL = deburr(item.body);
          let score = 0;

          tokens.forEach(t => {
            if (titleL.includes(t)) score += 12;
            if (bodyL.includes(t)) score += 4;
            // word-boundary bonus
            const re = new RegExp('\\b' + escapeRegExp(t), 'i');
            if (re.test(titleL)) score += 4;
            if (re.test(bodyL)) score += 2;
          });

          if (score === 0) return null;

          // Build snippet around first match (use original body, not deburred)
          let snippet = '';
          const firstMatch = tokens
            .map(t => bodyL.indexOf(t))
            .filter(i => i >= 0)
            .sort((a, b) => a - b)[0];
          if (firstMatch !== undefined) {
            const start = Math.max(0, firstMatch - 50);
            const end = Math.min(item.body.length, firstMatch + 130);
            snippet = (start > 0 ? '…' : '') + item.body.substring(start, end) + (end < item.body.length ? '…' : '');
          } else {
            snippet = item.body.substring(0, 160) + (item.body.length > 160 ? '…' : '');
          }

          return { item, score, snippet };
        })
        .filter(Boolean)
        .sort((a, b) => b.score - a.score)
        .slice(0, 10);
    }

    function highlight(text, query) {
      const tokens = query.toLowerCase().trim().split(/\s+/).filter(t => t.length > 1);
      let out = escapeHtml(text);
      tokens.forEach(t => {
        const re = new RegExp('(' + escapeRegExp(t) + ')', 'gi');
        out = out.replace(re, '<mark>$1</mark>');
      });
      return out;
    }

    function renderSearchResults(query) {
      const wrap = document.getElementById('search-results');
      if (!query.trim()) {
        wrap.innerHTML = `<div class="search-empty">${content[currentLang].search_hint}</div>`;
        searchFocusedIndex = -1;
        return;
      }
      const results = searchQuery(query);
      if (results.length === 0) {
        wrap.innerHTML = `<div class="search-empty">${content[currentLang].search_empty}</div>`;
        searchFocusedIndex = -1;
        return;
      }
      wrap.innerHTML = results.map((r, i) => `
        <button class="search-result ${i === 0 ? 'focused' : ''}" data-idx="${i}" data-section="${r.item.sectionId || ''}" data-element="${r.item.elementId || ''}" data-expand="${r.item.expand ? '1' : ''}" data-external="${r.item.external || ''}" data-open-drawer="${r.item.openDrawer ? '1' : ''}">
          <span class="result-icon"><svg class="icon"><use href="#${r.item.icon}"/></svg></span>
          <div class="result-content">
            <div class="result-meta">${r.item.typeLabel}</div>
            <div class="result-title">${highlight(r.item.title, query)}</div>
            <div class="result-snippet">${highlight(r.snippet, query)}</div>
          </div>
        </button>
      `).join('');
      searchFocusedIndex = 0;
      wrap.querySelectorAll('.search-result').forEach(btn => {
        btn.addEventListener('click', () => handleResultSelect(btn));
        btn.addEventListener('mouseenter', () => {
          wrap.querySelectorAll('.search-result.focused').forEach(b => b.classList.remove('focused'));
          btn.classList.add('focused');
          searchFocusedIndex = parseInt(btn.dataset.idx, 10);
        });
      });
    }

    function handleResultSelect(btn) {
      const sid = btn.dataset.section;
      const eid = btn.dataset.element;
      const exp = btn.dataset.expand === '1';
      const ext = btn.dataset.external;
      const openDrawer = btn.dataset.openDrawer === '1';

      closeSearch();

      if (ext) {
        window.open(ext, '_blank', 'noopener');
        return;
      }
      if (openDrawer) {
        setTimeout(() => openDrawerPanel(), 100);
        return;
      }
      if (eid) {
        const el = document.getElementById(eid);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          if (exp) {
            setTimeout(() => {
              el.classList.add('expanded');
              el.setAttribute('aria-expanded', 'true');
            }, 450);
          }
          return;
        }
      }
      if (sid) {
        const el = document.getElementById(sid);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function openSearch() {
      const modal = document.getElementById('search-modal');
      const input = document.getElementById('search-input');
      modal.hidden = false;
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      input.placeholder = content[currentLang].search_placeholder;
      setTimeout(() => input.focus(), 30);
      if (!input.value) renderSearchResults('');
    }

    function closeSearch() {
      const modal = document.getElementById('search-modal');
      modal.hidden = true;
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function setupSearch() {
      const trigger = document.getElementById('search-trigger');
      const closeBtn = document.getElementById('search-close');
      const backdrop = document.getElementById('search-backdrop');
      const input = document.getElementById('search-input');
      const results = document.getElementById('search-results');

      trigger.addEventListener('click', openSearch);
      closeBtn.addEventListener('click', closeSearch);
      backdrop.addEventListener('click', closeSearch);
      input.addEventListener('input', (e) => renderSearchResults(e.target.value));

      // Keyboard nav
      input.addEventListener('keydown', (e) => {
        const items = results.querySelectorAll('.search-result');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (items.length === 0) return;
          searchFocusedIndex = Math.min(searchFocusedIndex + 1, items.length - 1);
          items.forEach((b, i) => b.classList.toggle('focused', i === searchFocusedIndex));
          items[searchFocusedIndex].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (items.length === 0) return;
          searchFocusedIndex = Math.max(searchFocusedIndex - 1, 0);
          items.forEach((b, i) => b.classList.toggle('focused', i === searchFocusedIndex));
          items[searchFocusedIndex].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const focused = items[searchFocusedIndex];
          if (focused) handleResultSelect(focused);
        }
      });

      // Global shortcuts
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          openSearch();
        } else if (e.key === 'Escape' && !document.getElementById('search-modal').hidden) {
          closeSearch();
        }
      });
    }

    // ============ DRAWER (hamburger menu) ============
    function openDrawerPanel() {
      const drawer = document.getElementById('drawer');
      const trigger = document.getElementById('menu-trigger');
      if (!drawer) return;
      drawer.hidden = false;
      drawer.setAttribute('aria-hidden', 'false');
      if (trigger) trigger.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';

      // Highlight active chapter in TOC
      const activeRailLink = document.querySelector('.chapter-rail a.active');
      if (activeRailLink) {
        const activeId = activeRailLink.dataset.target;
        drawer.querySelectorAll('.drawer-toc-link').forEach(l => {
          l.classList.toggle('active', l.dataset.target === activeId);
        });
      }
    }

    function closeDrawer() {
      const drawer = document.getElementById('drawer');
      const trigger = document.getElementById('menu-trigger');
      if (!drawer) return;
      drawer.hidden = true;
      drawer.setAttribute('aria-hidden', 'true');
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    function setupDrawer() {
      const trigger = document.getElementById('menu-trigger');
      const closeBtn = document.getElementById('drawer-close');
      const backdrop = document.getElementById('drawer-backdrop');
      if (trigger) trigger.addEventListener('click', openDrawerPanel);
      if (closeBtn) closeBtn.addEventListener('click', closeDrawer);
      if (backdrop) backdrop.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !document.getElementById('drawer').hidden) closeDrawer();
      });
    }

    // ============ CHAPTER RAIL (active section tracking) ============
    function setupChapterRail() {
      const rail = document.getElementById('chapter-rail');
      if (!rail) return;

      const setActive = (id) => {
        rail.querySelectorAll('a').forEach(a => {
          a.classList.toggle('active', a.dataset.target === id);
        });
      };

      const observer = new IntersectionObserver((entries) => {
        const visible = entries.filter(e => e.isIntersecting);
        if (visible.length === 0) return;
        // Pick the topmost visible section
        const top = visible.reduce((a, b) =>
          (a.boundingClientRect.top < b.boundingClientRect.top ? a : b));
        setActive(top.target.id);
      }, {
        threshold: [0, 0.25],
        rootMargin: '-10% 0px -60% 0px'
      });

      railChapters.forEach(c => {
        const el = document.getElementById(c.id);
        if (el) observer.observe(el);
      });
    }

    // ============ SCROLLYTELLING (BOND DECAY) ============
    function setupScrolly() {
      const viz = document.querySelector('.bond-viz');
      const yearMarker = viz && viz.querySelector('.year-marker');
      const steps = document.querySelectorAll('#scrolly-steps .scrolly-step');
      if (!viz || steps.length === 0) return;

      let currentStep = -1;
      const setState = (step) => {
        if (step === currentStep) return;
        currentStep = step;
        viz.setAttribute('data-state', String(step));
        steps.forEach(s => s.classList.toggle('active', parseInt(s.dataset.step) === step));
        if (yearMarker) {
          const labels = (content[currentLang].scrolly_year_labels || '').split('|');
          if (labels[step]) yearMarker.textContent = labels[step];
        }
      };

      // Scroll-driven state: which step's top has crossed the 55% line?
      function update() {
        const lineY = window.innerHeight * 0.55;
        let active = 0;
        for (let i = 0; i < steps.length; i++) {
          const rect = steps[i].getBoundingClientRect();
          if (rect.top <= lineY) active = i;
          else break;
        }
        setState(active);
      }

      document.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update, { passive: true });
      update();
    }

    // ============ READING PROGRESS ============
    function setupProgress() {
      const fill = document.getElementById('progress-fill');
      function update() {
        const h = document.documentElement;
        const max = h.scrollHeight - h.clientHeight;
        const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
        fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
      }
      document.addEventListener('scroll', update, { passive: true });
      update();
    }

    // ============ INIT ============
    (function init() {
      const saved = localStorage.getItem('lang');
      const browser = (navigator.language || 'en').toLowerCase();
      const isNorwegian = browser.startsWith('no') || browser.startsWith('nb') || browser.startsWith('nn');
      const initialLang = saved || (isNorwegian ? 'no' : 'en');

      setLang(initialLang);

      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });

      document.getElementById('filter-clear').addEventListener('click', () => {
        activeFilter = null;
        renderPrinciples();
        renderCases();
        updateFilterStatus();
      });

      // Fade-in observer
      const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            fadeObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -50px 0px' });
      document.querySelectorAll('.fade-in').forEach(el => fadeObserver.observe(el));

      // Stats counter trigger: scroll-listener fallback
      const statsGrid = document.getElementById('stats-grid');
      function checkStatsVisible() {
        if (statsAnimated) return;
        const rect = statsGrid.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.85 && rect.bottom > 0) {
          statsAnimated = true;
          statsGrid.querySelectorAll('.stat-figure-num').forEach(animateCounter);
          document.removeEventListener('scroll', checkStatsVisible);
        }
      }
      document.addEventListener('scroll', checkStatsVisible, { passive: true });
      checkStatsVisible();

      setupProgress();
      setupScrolly();
      setupChapterRail();
      setupSearch();
      setupCompareStagger();
      setupDrawer();

      // Kill the principle-hint pulse after 6s or first interaction
      const pulseEl = document.querySelector('.principle-hint .pulse');
      if (pulseEl) {
        const stopPulse = () => {
          pulseEl.style.animation = 'none';
          pulseEl.style.opacity = '1';
        };
        setTimeout(stopPulse, 6000);
        document.getElementById('principles-grid').addEventListener('click', stopPulse, { once: true });
      }
    })();
  </script>
</body>
</html>
