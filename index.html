<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikkel 8 · En interaktiv guide til statens plikt</title>
  <meta name="description" content="Hva Den europeiske menneskerettskonvensjonens artikkel 8 krever av staten, og hva som faktisk skjer i Norge." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white: #ffffff;
      --off-white: #f6fbfd;
      --tint: #eaf6fd;
      --ink: #0a1929;
      --body: #1a2942;
      --muted: #5c6f8a;
      --muted-soft: #93a3b8;
      --rule: #dde7ef;
      --rule-soft: #ebf1f6;
      --brand: #4db2ec;
      --brand-deep: #1a7fb8;
      --brand-darker: #0c5780;
      --brand-soft: rgba(77, 178, 236, 0.10);
      --brand-softer: rgba(77, 178, 236, 0.04);
      --accent: #e11d48;
      --accent-soft: rgba(225, 29, 72, 0.08);
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --max: 1100px;
      --max-narrow: 760px;
      --pad: clamp(20px, 4vw, 48px);
      --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ============ ICONS ============ */
    .icon {
      width: 1em;
      height: 1em;
      vertical-align: -0.15em;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .icon-xs { width: 12px; height: 12px; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 20px; height: 20px; }
    .icon-lg { width: 28px; height: 28px; }
    .icon-xl { width: 40px; height: 40px; }

    body {
      background: var(--white);
      color: var(--body);
      font-family: var(--sans);
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      font-feature-settings: "ss01", "cv11";
    }

    ::selection { background: var(--brand); color: var(--ink); }

    a { color: inherit; }

    /* ============ HEADER ============ */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(160%) blur(14px);
      -webkit-backdrop-filter: saturate(160%) blur(14px);
      border-bottom: 1px solid var(--rule);
      padding: 12px var(--pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--ink);
      min-width: 0;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
      flex: 0 0 auto;
    }

    .brand-divider {
      width: 1px;
      height: 18px;
      background: var(--rule);
    }

    .brand-tagline {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .progress-rail {
      height: 2px;
      width: 80px;
      background: var(--rule-soft);
      border-radius: 2px;
      overflow: hidden;
      display: block;
    }

    @media (min-width: 720px) { .progress-rail { width: 140px; } }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--brand);
      transform-origin: left;
      transition: width 0.15s linear;
    }

    .lang-toggle {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }

    .lang-toggle button {
      background: transparent;
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: color 0.2s var(--ease), background 0.2s var(--ease);
    }

    .lang-toggle button:hover { color: var(--ink); }
    .lang-toggle button.active {
      background: var(--ink);
      color: var(--white);
    }

    /* ============ HERO ============ */
    .hero {
      position: relative;
      padding: clamp(60px, 12vh, 140px) var(--pad) clamp(80px, 14vh, 160px);
      max-width: 1240px;
      margin: 0 auto;
      overflow: hidden;
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--rule-soft) 1px, transparent 1px),
        linear-gradient(to bottom, var(--rule-soft) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at 70% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 70% 30%, black 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.6;
    }

    .hero-inner { position: relative; }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 28px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--brand-soft);
      border-radius: 999px;
    }

    .hero h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(36px, 5.6vw, 76px);
      line-height: 1.04;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin: 0 0 32px;
      max-width: 22ch;
    }

    .hero h1 .brand-highlight { color: var(--brand-deep); }
    .hero h1 .underline {
      position: relative;
      display: inline-block;
      white-space: nowrap;
    }
    .hero h1 .underline::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0.05em;
      height: 0.18em;
      background: var(--brand);
      opacity: 0.35;
      z-index: -1;
    }

    .hero .lede {
      font-size: clamp(18px, 1.9vw, 22px);
      line-height: 1.55;
      color: var(--body);
      max-width: 38em;
      font-weight: 400;
      margin: 0 0 40px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      padding-top: 28px;
      border-top: 1px solid var(--rule);
      max-width: 720px;
    }

    .hero-meta-item {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-meta-item strong {
      color: var(--ink);
      font-weight: 700;
      letter-spacing: -0.01em;
      font-size: 13px;
    }

    .hero-meta-item .dot {
      width: 4px;
      height: 4px;
      background: var(--brand);
      border-radius: 50%;
    }

    .scroll-cue {
      margin-top: clamp(48px, 8vh, 80px);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 10px 18px 10px 18px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      transition: all 0.25s var(--ease);
    }

    .scroll-cue:hover {
      color: var(--brand-deep);
      border-color: var(--brand);
      background: var(--brand-softer);
    }

    .scroll-cue .arrow {
      display: inline-block;
      transition: transform 0.25s var(--ease);
    }

    .scroll-cue:hover .arrow { transform: translateY(2px); }

    /* ============ CHAPTERS ============ */
    .chapter {
      padding: clamp(70px, 11vh, 130px) var(--pad);
      position: relative;
    }

    .chapter > .inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .chapter.bg-alt { background: var(--off-white); }

    .chapter-head {
      max-width: var(--max-narrow);
      margin-bottom: 56px;
    }

    .section-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 18px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px 8px 10px;
      background: var(--brand-soft);
      border-radius: 999px;
    }

    .section-tag .icon {
      color: var(--brand);
      width: 16px;
      height: 16px;
      stroke-width: 2.2;
    }

    .chapter h2 {
      font-family: var(--sans);
      font-weight: 700;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0 0 32px;
    }

    .chapter .intro {
      font-size: 18px;
      line-height: 1.6;
      color: var(--body);
      margin: 0;
    }

    .chapter .intro.large {
      font-size: clamp(18px, 1.7vw, 21px);
      line-height: 1.55;
    }

    /* ============ OPENER (Chapter 0) ============ */
    .chapter.ch-start {
      background: linear-gradient(180deg, var(--white) 0%, var(--tint) 100%);
    }

    .opener-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    @media (min-width: 720px) {
      .opener-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
    }

    @media (min-width: 1100px) {
      .opener-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .opener-card {
      padding: 28px 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      transition: transform 0.25s var(--ease), border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
    }

    .opener-card:hover {
      transform: translateY(-3px);
      border-color: var(--brand);
      box-shadow: 0 10px 30px -10px rgba(26, 127, 184, 0.18);
    }

    .opener-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 18px;
    }

    .opener-icon .icon { width: 26px; height: 26px; stroke-width: 1.8; }

    .opener-card h3 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink);
      margin: 0 0 10px;
      letter-spacing: -0.01em;
    }

    .opener-card p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }

    .opener-actors {
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid var(--rule);
    }

    .opener-actors h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin: 0 0 8px;
    }

    .opener-actors .opener-actors-sub {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 28px;
    }

    .actors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .actor-chip {
      padding: 18px 18px 16px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      position: relative;
    }

    .actor-chip:hover {
      border-color: var(--brand);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -10px rgba(26, 127, 184, 0.2);
    }

    .actor-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 12px;
    }

    .actor-icon .icon { width: 22px; height: 22px; stroke-width: 1.9; }

    .actor-chip.state .actor-icon { background: rgba(225, 29, 72, 0.08); color: var(--accent); }

    .actor-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    .actor-role {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ============ TREATY CARD (Section 1) ============ */
    .treaty {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 16px;
    }

    @media (min-width: 880px) {
      .treaty { grid-template-columns: 1.4fr 1fr; gap: 40px; }
    }

    .treaty-quote {
      padding: 36px 32px;
      background: var(--ink);
      color: var(--white);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .treaty-quote::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, var(--brand) 0%, transparent 70%);
      opacity: 0.18;
      pointer-events: none;
    }

    .treaty-quote .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 18px;
    }

    .treaty-quote .article-num {
      font-size: 44px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
      color: var(--white);
    }

    .treaty-quote .body {
      font-size: 18px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 400;
      max-width: 38em;
    }

    .treaty-quote .citation {
      margin-top: 22px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.6);
    }

    .treaty-side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .treaty-fact {
      padding: 22px 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 8px;
    }

    .chapter.bg-alt .treaty-fact { background: var(--white); }

    .treaty-fact .ff-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 8px;
    }

    .treaty-fact .ff-body {
      font-size: 15px;
      line-height: 1.55;
      color: var(--body);
    }

    .treaty-fact.ff-highlight {
      background: var(--ink);
      border-color: var(--ink);
    }

    .treaty-fact.ff-highlight .ff-label { color: var(--brand); }
    .treaty-fact.ff-highlight .ff-body { color: rgba(255, 255, 255, 0.92); }

    /* ============ PRINCIPLES ============ */
    .principles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 16px;
    }

    .principle {
      padding: 28px 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      position: relative;
      text-align: left;
      font-family: inherit;
      color: inherit;
    }

    .chapter.bg-alt .principle { background: var(--white); }

    .principle:hover {
      transform: translateY(-3px);
      border-color: var(--brand);
      box-shadow: 0 10px 30px -10px rgba(26, 127, 184, 0.15);
    }

    .principle:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 3px;
    }

    .case:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: -2px;
    }

    .principle.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
      box-shadow: 0 10px 30px -10px rgba(10, 25, 41, 0.3);
    }

    .principle.active .pnum,
    .principle.active h3 { color: var(--brand); }

    .principle.active p { color: rgba(255, 255, 255, 0.78); }

    .principle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 18px;
      transition: background 0.25s var(--ease), color 0.25s var(--ease), transform 0.25s var(--ease);
    }

    .principle-icon .icon { width: 22px; height: 22px; stroke-width: 2; }

    .principle:hover .principle-icon { transform: scale(1.05) rotate(-3deg); }
    .principle.active .principle-icon { background: rgba(77, 178, 236, 0.2); color: var(--brand); }

    .principle .pnum {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--brand-deep);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .principle .pnum::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: 0.25;
    }

    .principle h3 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 12px;
    }

    .principle p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }

    .principle-hint {
      margin-top: 24px;
      font-size: 12.5px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .principle-hint .pulse {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--brand);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* ============ TIMELINE ============ */
    .timeline-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .timeline-controls .filter-label {
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .filter-clear {
      background: none;
      border: none;
      color: var(--brand-deep);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s var(--ease);
    }

    .filter-clear:hover { background: var(--brand-soft); }
    .filter-clear:disabled { opacity: 0.4; cursor: default; }

    .timeline {
      position: relative;
      margin-top: 8px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 92px;
      top: 14px;
      bottom: 14px;
      width: 2px;
      background: var(--rule);
      border-radius: 2px;
    }

    .case {
      position: relative;
      padding: 22px 0 22px 140px;
      border-bottom: 1px solid var(--rule-soft);
      transition: opacity 0.3s var(--ease), background 0.2s var(--ease);
      cursor: pointer;
    }

    .case:last-child { border-bottom: none; }

    .case:hover { background: var(--brand-softer); }

    .case.dimmed { opacity: 0.25; }

    .case::before {
      content: '';
      position: absolute;
      left: 86px;
      top: 32px;
      width: 14px;
      height: 14px;
      background: var(--white);
      border: 3px solid var(--brand);
      border-radius: 50%;
      box-sizing: border-box;
      transition: transform 0.25s var(--ease), background 0.25s var(--ease);
      z-index: 1;
    }

    .case:hover::before { transform: scale(1.25); background: var(--brand); }
    .case.expanded::before { background: var(--brand); transform: scale(1.25); }

    .chapter.bg-alt .case::before { background: var(--off-white); }
    .chapter.bg-alt .case:hover::before,
    .chapter.bg-alt .case.expanded::before { background: var(--brand); }

    .case-year {
      position: absolute;
      left: 0;
      top: 22px;
      width: 72px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-align: right;
    }

    .case-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .case-name {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--ink);
    }

    .case-name em { font-style: italic; font-weight: 700; font-feature-settings: "ss01"; }

    .case-country {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 3px 8px;
      background: var(--rule-soft);
      border-radius: 4px;
    }

    .chapter.bg-alt .case-country { background: var(--white); }

    .case-principle {
      font-size: 16px;
      line-height: 1.55;
      color: var(--body);
      max-width: 40em;
    }

    .case-toggle {
      position: absolute;
      right: 4px;
      top: 24px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted-soft);
      transition: transform 0.3s var(--ease), color 0.2s var(--ease);
      pointer-events: none;
    }

    .case:hover .case-toggle { color: var(--brand-deep); }
    .case.expanded .case-toggle { transform: rotate(90deg); color: var(--brand); }

    .timeline-hint {
      margin-bottom: 16px;
      font-size: 12.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.02em;
    }

    .timeline-hint svg { color: var(--brand); flex: 0 0 auto; }

    .case-tags {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .case-tag {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--brand-deep);
      padding: 3px 9px;
      border: 1px solid var(--brand-soft);
      background: var(--brand-softer);
      border-radius: 999px;
      transition: all 0.2s var(--ease);
    }

    .case-tag.match {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
    }

    .case-expand {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s var(--ease), margin-top 0.4s var(--ease);
    }

    .case.expanded .case-expand {
      max-height: 400px;
      margin-top: 18px;
    }

    .case-quote {
      padding: 18px 22px;
      background: var(--white);
      border-left: 3px solid var(--brand);
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--body);
      font-style: italic;
    }

    .chapter.bg-alt .case-quote { background: var(--off-white); border-color: var(--brand); background: var(--white); }

    .case-quote-source {
      display: block;
      margin-top: 12px;
      font-style: normal;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .case-hudoc-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 6px 12px 6px 10px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      font-style: normal;
      letter-spacing: 0.02em;
      transition: background 0.2s var(--ease), color 0.2s var(--ease), transform 0.2s var(--ease);
    }

    .case-hudoc-link:hover {
      background: var(--brand);
      color: var(--white);
      transform: translateX(2px);
    }

    .case-hudoc-link .icon { width: 13px; height: 13px; stroke-width: 2.2; }

    /* ============ DRAWER (hamburger menu) ============ */
    .menu-trigger {
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 999px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s var(--ease);
      flex: 0 0 auto;
    }
    .menu-trigger:hover { color: var(--brand-deep); border-color: var(--brand); }
    .menu-trigger .icon { width: 16px; height: 16px; stroke-width: 2.2; }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 250;
    }
    .drawer[hidden] { display: none; }

    .drawer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 25, 41, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: drawerBackdropIn 0.2s ease;
    }

    @keyframes drawerBackdropIn { from { opacity: 0; } to { opacity: 1; } }

    .drawer-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(420px, 92vw);
      background: var(--white);
      box-shadow: -10px 0 40px -10px rgba(10, 25, 41, 0.3);
      display: flex;
      flex-direction: column;
      animation: drawerSlideIn 0.32s var(--ease);
      overflow: hidden;
    }

    @keyframes drawerSlideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--rule);
      flex: 0 0 auto;
    }

    .drawer-head .drawer-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
    }

    .drawer-close {
      background: var(--rule-soft);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: all 0.15s var(--ease);
    }
    .drawer-close:hover { background: var(--rule); color: var(--ink); }
    .drawer-close .icon { width: 14px; height: 14px; }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 32px;
    }

    .drawer-section {
      padding: 18px 22px 8px;
    }

    .drawer-section + .drawer-section {
      border-top: 1px solid var(--rule-soft);
    }

    .drawer-section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-section-label .icon { width: 14px; height: 14px; color: var(--brand); }

    .drawer-toc { list-style: none; padding: 0; margin: 0; }

    .drawer-toc li {
      counter-increment: tocnum;
    }

    .drawer-toc a {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 10px;
      margin: 0 -10px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--ink);
      font-size: 14px;
      transition: background 0.15s var(--ease);
    }

    .drawer-toc a:hover { background: var(--brand-soft); }

    .drawer-toc a.active { background: var(--brand); color: var(--white); }
    .drawer-toc a.active .toc-icon { background: rgba(255, 255, 255, 0.22); color: var(--white); }
    .drawer-toc a.active .toc-meta { color: rgba(255, 255, 255, 0.75); }

    .toc-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      flex: 0 0 auto;
      transition: background 0.15s var(--ease), color 0.15s var(--ease);
    }
    .toc-icon .icon { width: 14px; height: 14px; }

    .toc-content { flex: 1; min-width: 0; }

    .toc-meta {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .toc-title {
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.005em;
      line-height: 1.35;
    }

    .drawer-glossary { list-style: none; padding: 0; margin: 0; }

    .drawer-glossary li {
      padding: 12px 10px;
      margin: 0 -10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s var(--ease);
    }
    .drawer-glossary li:hover { background: var(--brand-soft); }

    .glossary-term {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 3px;
      letter-spacing: -0.005em;
    }

    .glossary-term .glossary-pron {
      font-weight: 400;
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0;
      margin-left: 6px;
      text-transform: lowercase;
    }

    .glossary-def {
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--muted);
    }

    .glossary-def strong { color: var(--ink); font-weight: 600; }

    .drawer-tips {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .drawer-tips li {
      padding: 8px 0 8px 24px;
      position: relative;
      font-size: 13px;
      line-height: 1.5;
      color: var(--body);
    }

    .drawer-tips li::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 14px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
    }

    .drawer-tips li kbd {
      display: inline-block;
      padding: 1px 5px;
      background: var(--rule-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--ink);
      font-weight: 600;
    }

    /* ============ SEARCH ============ */
    .search-trigger {
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 999px;
      height: 32px;
      padding: 0 14px 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: all 0.2s var(--ease);
    }

    .search-trigger:hover { color: var(--brand-deep); border-color: var(--brand); }
    .search-trigger .icon { width: 14px; height: 14px; }

    .search-kbd {
      display: inline-flex;
      align-items: center;
      gap: 1px;
      padding: 1px 6px;
      background: var(--rule-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      margin-left: 4px;
    }

    @media (max-width: 720px) { .search-trigger .search-label, .search-trigger .search-kbd { display: none; } .search-trigger { padding: 0; width: 32px; justify-content: center; } }

    .search-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 20px 20px;
    }

    .search-modal[hidden] { display: none; }

    .search-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 25, 41, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: searchBackdropIn 0.2s ease;
    }

    @keyframes searchBackdropIn { from { opacity: 0; } to { opacity: 1; } }

    .search-modal-content {
      position: relative;
      background: var(--white);
      border-radius: 12px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 24px 60px -10px rgba(10, 25, 41, 0.45);
      overflow: hidden;
      animation: searchModalIn 0.25s var(--ease);
    }

    @keyframes searchModalIn { from { opacity: 0; transform: translateY(-12px) scale(0.98); } to { opacity: 1; transform: none; } }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--rule);
    }

    .search-input-wrap > .icon:first-child { color: var(--brand-deep); width: 20px; height: 20px; }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 17px;
      background: transparent;
      color: var(--ink);
      letter-spacing: -0.01em;
      min-width: 0;
    }

    .search-input::placeholder { color: var(--muted-soft); }

    .search-close {
      background: var(--rule-soft);
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex: 0 0 auto;
      transition: all 0.15s var(--ease);
    }

    .search-close:hover { background: var(--rule); color: var(--ink); }
    .search-close .icon { width: 14px; height: 14px; }

    .search-results {
      max-height: 60vh;
      overflow-y: auto;
      padding: 6px;
    }

    .search-empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .search-empty .icon {
      width: 32px; height: 32px; color: var(--muted-soft);
      margin-bottom: 12px; opacity: 0.6;
    }

    .search-result {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: 100%;
      padding: 12px 14px;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--ink);
      transition: background 0.15s var(--ease);
    }

    .search-result:hover, .search-result.focused { background: var(--brand-soft); }

    .search-result + .search-result { border-top: 1px solid var(--rule-soft); margin-top: 2px; }

    .result-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      flex: 0 0 auto;
    }

    .result-icon .icon { width: 16px; height: 16px; }

    .result-content { flex: 1; min-width: 0; }

    .result-meta {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 4px;
    }

    .result-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 4px;
      letter-spacing: -0.005em;
    }

    .result-snippet {
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--muted);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .result-snippet mark, .result-title mark {
      background: rgba(77, 178, 236, 0.35);
      color: var(--ink);
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }

    .search-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--rule);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--off-white);
    }

    .search-footer kbd {
      display: inline-block;
      padding: 1px 5px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      color: var(--ink);
      font-weight: 600;
      margin: 0 2px;
    }

    /* ============ CHAPTER RAIL (sticky journey beats) ============ */
    .chapter-rail {
      position: fixed;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: none;
    }

    @media (min-width: 1024px) { .chapter-rail { display: block; } }

    .chapter-rail ol {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chapter-rail a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--rule);
      color: var(--muted);
      text-decoration: none;
      position: relative;
      transition: all 0.25s var(--ease);
    }

    .chapter-rail a .icon { width: 14px; height: 14px; stroke-width: 2.2; }

    .chapter-rail a:hover {
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-color: var(--brand);
    }

    .chapter-rail a.active {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
      transform: scale(1.18);
      box-shadow: 0 4px 14px -2px rgba(77, 178, 236, 0.45);
    }

    .chapter-rail a.dark.active {
      background: var(--ink);
      color: var(--brand);
      border-color: var(--ink);
      box-shadow: 0 4px 14px -2px rgba(10, 25, 41, 0.4);
    }

    .rail-label {
      position: absolute;
      right: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%) translateX(8px);
      background: var(--ink);
      color: var(--white);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 6px 10px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
    }

    .rail-label::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 4px solid transparent;
      border-left-color: var(--ink);
    }

    .chapter-rail a:hover .rail-label,
    .chapter-rail a.active .rail-label {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    /* ============ SCROLLYTELLING (BOND DECAY) ============ */
    .scrolly {
      position: relative;
      background: var(--ink);
      color: var(--white);
      padding: clamp(80px, 12vh, 140px) 0 clamp(40px, 6vh, 80px);
      isolation: isolate;
    }

    .scrolly-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(77, 178, 236, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(225, 29, 72, 0.10) 0%, transparent 55%);
      pointer-events: none;
    }

    .scrolly-head {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--pad) clamp(48px, 8vh, 80px);
      position: relative;
      z-index: 1;
    }

    .scrolly-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 18px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px 8px 10px;
      background: rgba(77, 178, 236, 0.12);
      border-radius: 999px;
    }

    .scrolly-tag .icon { width: 16px; height: 16px; color: var(--brand); }

    .scrolly h2 {
      font-size: clamp(28px, 4.5vw, 50px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--white);
      margin: 0 0 22px;
      max-width: 20ch;
    }

    .scrolly .scrolly-sub {
      font-size: clamp(17px, 1.9vw, 22px);
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.75);
      max-width: 38em;
      margin: 0;
      font-weight: 400;
    }

    .scrolly-sub em { color: var(--brand); font-style: italic; font-weight: 500; }

    .scrolly-container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--pad);
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 880px) {
      .scrolly-container { grid-template-columns: 1.05fr 1fr; gap: 60px; }
    }

    .scrolly-graphic {
      position: sticky;
      top: 100px;
      height: calc(100vh - 160px);
      max-height: 560px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: start;
    }

    .bond-viz {
      width: 100%;
      height: 100%;
      max-width: 560px;
    }

    .bond-viz .figure { transition: opacity 0.8s var(--ease), transform 0.8s var(--ease); transform-origin: center; }
    .bond-viz .figure-child { transition-delay: 0.05s; }
    .bond-viz .cord { transition: stroke-dasharray 0.8s var(--ease), stroke-opacity 0.8s var(--ease), stroke 0.8s var(--ease); }
    .bond-viz .year-marker { transition: opacity 0.5s var(--ease); }

    /* Decay states */
    .bond-viz[data-state="0"] .cord { stroke-dasharray: 1000 0; stroke-opacity: 1; stroke: var(--brand); }
    .bond-viz[data-state="0"] .figure-child { opacity: 1; }

    .bond-viz[data-state="1"] .cord { stroke-dasharray: 32 6; stroke-opacity: 0.92; stroke: var(--brand); }
    .bond-viz[data-state="1"] .figure-child { opacity: 0.96; }

    .bond-viz[data-state="2"] .cord { stroke-dasharray: 20 14; stroke-opacity: 0.7; stroke: #6ec5f0; }
    .bond-viz[data-state="2"] .figure-child { opacity: 0.78; transform: translateX(6px); }

    .bond-viz[data-state="3"] .cord { stroke-dasharray: 10 26; stroke-opacity: 0.45; stroke: #a8a8a8; }
    .bond-viz[data-state="3"] .figure-child { opacity: 0.55; transform: translateX(14px); }

    .bond-viz[data-state="4"] .cord { stroke-dasharray: 4 36; stroke-opacity: 0.25; stroke: var(--accent); }
    .bond-viz[data-state="4"] .figure-child { opacity: 0.28; transform: translateX(22px); }

    .scrolly-steps {
      display: flex;
      flex-direction: column;
      padding-top: 8vh;
      padding-bottom: 30vh;
    }

    .scrolly-step {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      opacity: 0.32;
      transition: opacity 0.6s var(--ease);
      padding: 30px 0;
    }

    .scrolly-step.active { opacity: 1; }

    .step-year {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: var(--brand);
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 999px;
      margin-bottom: 18px;
      align-self: flex-start;
      transition: background 0.4s var(--ease), color 0.4s var(--ease);
    }

    .scrolly-step[data-step="4"] .step-year { background: var(--accent); color: var(--white); }
    .scrolly-step[data-step="3"] .step-year { background: rgba(168, 168, 168, 0.7); color: var(--ink); }

    .scrolly-step p {
      font-size: clamp(20px, 2.1vw, 26px);
      line-height: 1.4;
      color: var(--white);
      font-weight: 500;
      max-width: 22em;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .scrolly-step p em {
      color: var(--brand);
      font-style: italic;
      font-weight: 600;
    }

    .scrolly-step[data-step="4"] p em { color: var(--accent); }

    /* Mobile: graphic appears above the steps, no sticky */
    @media (max-width: 880px) {
      .scrolly-graphic {
        position: relative;
        top: 0;
        height: 280px;
        min-height: 0;
      }
      .scrolly-step { min-height: auto; padding: 24px 0; }
      .scrolly-steps { padding-bottom: 0; }
    }

    /* ============ STATS (dramatic) ============ */
    .stats-dramatic {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 16px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 56px 0;
      border-top: 1px solid var(--rule);
      align-items: center;
    }

    .stat-row:last-child { border-bottom: 1px solid var(--rule); }

    @media (min-width: 720px) {
      .stat-row { grid-template-columns: minmax(220px, 320px) 1fr; gap: 48px; }
    }

    .stat-figure {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .stat-figure-num {
      font-family: var(--sans);
      font-weight: 900;
      font-size: clamp(96px, 18vw, 200px);
      line-height: 0.85;
      letter-spacing: -0.06em;
      color: var(--brand-deep);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .stat-figure-num.accent { color: var(--accent); }
    .stat-figure-num.ink { color: var(--ink); }

    .stat-figure-unit {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 12px;
    }

    .stat-figure-unit strong { color: var(--brand-deep); font-weight: 700; }

    .stat-body p {
      font-size: clamp(18px, 1.9vw, 22px);
      line-height: 1.4;
      color: var(--ink);
      margin: 0 0 14px;
      max-width: 32em;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    .stat-body p strong { background: rgba(225, 29, 72, 0.12); padding: 0 4px; color: var(--accent); font-weight: 700; }

    .stat-body p em { color: var(--brand-deep); font-style: italic; font-weight: 600; }

    .stat-body .stat-citation {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .stat-body .stat-citation::before {
      content: '';
      width: 18px;
      height: 1px;
      background: var(--brand);
    }

    /* Month grid viz for Ribić */
    .viz-months {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 3px;
      max-width: 560px;
      margin-top: 18px;
    }

    .viz-month {
      aspect-ratio: 1;
      background: var(--rule-soft);
      border-radius: 1.5px;
      transition: background 0.4s ease, transform 0.4s ease;
    }

    .viz-month.visit {
      background: var(--brand);
      box-shadow: 0 0 0 2px var(--brand-soft);
      transform: scale(1.4);
      z-index: 1;
      position: relative;
    }

    .viz-months-legend {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .viz-legend-key {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .viz-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--rule-soft);
    }

    .viz-legend-dot.visit {
      background: var(--brand);
    }

    /* Petitions stack viz for Ónodi */
    .viz-petitions {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px 6px;
      max-width: 560px;
      margin-top: 18px;
    }

    .viz-petition {
      aspect-ratio: 0.72;
      background: linear-gradient(180deg, var(--off-white) 0%, var(--rule-soft) 100%);
      border: 1px solid var(--rule);
      border-radius: 1.5px;
      position: relative;
      overflow: hidden;
    }

    .viz-petition::before {
      content: '';
      position: absolute;
      left: 18%; right: 18%; top: 28%;
      height: 1px;
      background: var(--muted-soft);
      opacity: 0.4;
    }
    .viz-petition::after {
      content: '';
      position: absolute;
      left: 18%; right: 36%; top: 44%;
      height: 1px;
      background: var(--muted-soft);
      opacity: 0.4;
    }

    .viz-petition .stamp {
      position: absolute;
      inset: 60% 12% 12% 12%;
      background: var(--accent);
      transform: rotate(-12deg);
      opacity: 0;
      border-radius: 1px;
      animation: stampDrop 0.4s ease forwards;
    }

    @keyframes stampDrop {
      0% { opacity: 0; transform: rotate(-12deg) translateY(-6px) scale(1.4); }
      100% { opacity: 0.85; transform: rotate(-12deg) translateY(0) scale(1); }
    }

    .viz-petitions-caption {
      margin-top: 14px;
      font-size: 12.5px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .viz-petitions-caption strong { color: var(--accent); font-weight: 700; }

    /* ============ COMPARISON ============ */
    .compare-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      margin-top: 8px;
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
      background: var(--white);
    }

    @media (min-width: 760px) {
      .compare-wrap { grid-template-columns: 1fr 1fr; }
    }

    .compare-col {
      padding: 0;
    }

    .compare-head {
      padding: 18px 24px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .compare-head .badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .compare-col.standard .compare-head { background: var(--ink); color: var(--white); }
    .compare-col.standard .compare-head .badge { background: var(--brand); }
    .compare-col.practice .compare-head { background: var(--off-white); color: var(--ink); border-bottom: 1px solid var(--rule); }
    .compare-col.practice .compare-head .badge { background: var(--accent); }

    @media (min-width: 760px) {
      .compare-col.practice .compare-head { border-bottom: 1px solid var(--rule); border-left: 1px solid var(--rule); }
    }

    .compare-row {
      padding: 20px 24px;
      border-top: 1px solid var(--rule);
      font-size: 15.5px;
      line-height: 1.55;
      color: var(--body);
      transition: background 0.2s var(--ease), opacity 0.5s var(--ease), transform 0.5s var(--ease);
      cursor: pointer;
      opacity: 0;
      transform: translateY(14px);
    }

    .compare-row.in {
      opacity: 1;
      transform: translateY(0);
    }

    .compare-wrap.has-focus .compare-row:not(.pair-focused) {
      opacity: 0.32;
    }
    .compare-wrap.has-focus .compare-row.pair-focused {
      opacity: 1;
    }

    .compare-row.pair-focused {
      background: var(--brand-softer);
      box-shadow: inset 3px 0 0 0 var(--brand);
    }
    .compare-col.practice .compare-row.pair-focused {
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 0 var(--accent);
    }

    .compare-col.standard .compare-row {
      background: var(--white);
    }

    .compare-col.practice .compare-row {
      background: var(--off-white);
    }

    @media (min-width: 760px) {
      .compare-col.practice .compare-row { border-left: 1px solid var(--rule); }
    }

    .compare-row strong {
      color: var(--ink);
      font-weight: 700;
    }

    .compare-row:hover,
    .compare-row.pair-hover { background: var(--brand-softer); }

    .compare-col.practice .compare-row:hover,
    .compare-col.practice .compare-row.pair-hover { background: var(--accent-soft); }

    /* ============ NORWAY RECORD ============ */
    .record-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
      margin-top: 16px;
    }

    @media (min-width: 960px) {
      .record-grid { grid-template-columns: 1.55fr 1fr; gap: 40px; align-items: start; }
    }

    .record-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--rule);
    }

    .record-stat {
      padding: 28px 24px 28px 0;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .record-stat:nth-child(even) { border-right: none; padding-left: 28px; }
    .record-stat:nth-last-child(-n+2) { border-bottom: none; }

    @media (max-width: 600px) {
      .record-stats { grid-template-columns: 1fr; }
      .record-stat { border-right: none; padding: 24px 0; }
      .record-stat:nth-child(even) { padding-left: 0; }
    }

    .record-stat .rs-num {
      font-weight: 800;
      font-size: clamp(40px, 5.5vw, 64px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--brand-deep);
      margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .record-stat .rs-num.accent { color: var(--accent); }

    .record-stat .rs-label {
      font-size: 14px;
      line-height: 1.5;
      color: var(--body);
      font-weight: 400;
      max-width: 26em;
    }

    .record-stat .rs-source {
      display: block;
      margin-top: 10px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .record-callout {
      padding: 32px 28px;
      background: var(--ink);
      color: var(--white);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .record-callout::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 100% 0%, rgba(77, 178, 236, 0.18) 0%, transparent 55%);
      pointer-events: none;
    }

    .callout-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 18px;
    }

    .callout-quote {
      margin: 0 0 18px;
      padding: 0;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.005em;
    }

    .callout-cite {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.6);
    }

    .record-note {
      margin-top: 36px;
      padding: 20px 24px;
      background: var(--brand-softer);
      border-left: 3px solid var(--brand);
      border-radius: 4px;
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--body);
      max-width: 48em;
    }

    .record-note strong { color: var(--ink); font-weight: 700; }

    /* ============ SOURCES ============ */
    .source-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    @media (min-width: 720px) {
      .source-list { grid-template-columns: repeat(2, 1fr); }
    }

    .source-card {
      padding: 24px 26px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.25s var(--ease);
      position: relative;
    }

    .src-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 6px;
      transition: background 0.2s var(--ease), color 0.2s var(--ease);
    }

    .src-icon .icon { width: 18px; height: 18px; }

    .source-card:hover .src-icon { background: var(--brand); color: var(--white); }

    .chapter.bg-alt .source-card { background: var(--white); }

    .source-card:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: 0 10px 24px -12px rgba(26, 127, 184, 0.18);
    }

    .source-card .src-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
    }

    .source-card .src-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .source-card .src-url {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-card .src-url::after {
      content: '→';
      transition: transform 0.2s var(--ease);
    }

    .source-card:hover .src-url::after { transform: translateX(4px); }

    /* ============ FOOTER ============ */
    .site-footer {
      padding: 64px var(--pad) 48px;
      border-top: 1px solid var(--rule);
      background: var(--white);
    }

    .site-footer .inner {
      max-width: var(--max);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 760px) {
      .site-footer .inner { grid-template-columns: 1.5fr 1fr; gap: 56px; }
    }

    .footer-mark {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 18px;
    }

    .footer-logo {
      height: 64px;
      width: auto;
      display: block;
    }

    .footer-mark-text span {
      display: block;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .site-footer p {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 12px;
      max-width: 56em;
    }

    .site-footer a {
      color: var(--brand-deep);
      text-decoration: underline;
      text-decoration-color: var(--brand-soft);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s var(--ease);
    }

    .site-footer a:hover { text-decoration-color: var(--brand); }

    .footer-meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-soft);
      padding-top: 24px;
      border-top: 1px solid var(--rule-soft);
      margin-top: 24px;
      grid-column: 1 / -1;
    }

    /* ============ ANIMATIONS ============ */
    .fade-in {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 1s var(--ease), transform 1s var(--ease);
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 720px) {
      body { font-size: 16px; }

      .header-right { gap: 10px; }
      .brand-divider, .brand-tagline { display: none; }

      .timeline::before { left: 12px; }
      .case { padding: 22px 0 22px 38px; }
      .case::before { left: 6px; top: 26px; }
      .case-year { position: static; text-align: left; width: auto; margin-bottom: 8px; display: block; }
      .case-name { font-size: 17px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-in { opacity: 1; transform: none; transition: none; }
      html { scroll-behavior: auto; }
      .principle:hover { transform: none; }
      .source-card:hover { transform: none; }
      .pulse { animation: none; }
    }
  </style>
</head>

    function renderCases() {
      const tl = document.getElementById('case-timeline');
      const hudocLabel = currentLang === 'no' ? 'Les dommen på HUDOC' : 'Read judgment on HUDOC';
      tl.innerHTML = cases.map((c, i) => {
        const dimmed = activeFilter && !c.tags.includes(activeFilter) ? 'dimmed' : '';
        const tagsHTML = c.tags.map(t => {
          const principle = principles.find(p => p.id === t);
          const match = activeFilter === t ? 'match' : '';
          return `<span class="case-tag ${match}">${principle[currentLang].title.replace(/\.$/, '')}</span>`;
        }).join('');
        const paraSuffix = c.paragraphs ? `, ${c.paragraphs}` : '';
        const sourceLine = `${c.name} v. ${c.country.en} · app. no. ${c.appNo}${paraSuffix}`;
        return `
          <div class="case ${dimmed}" data-idx="${i}" id="case-${i}" role="button" tabindex="0" aria-expanded="false">

              <div class="case-country">${c.country[currentLang]}</div>

          </div>
        `;
      }).join('');
      tl.querySelectorAll('.case').forEach(el => {
        const toggle = () => {
          el.classList.toggle('expanded');
          el.setAttribute('aria-expanded', el.classList.contains('expanded') ? 'true' : 'false');
        };
        el.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          toggle();
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle();
          }
        });
      });
    }

    function buildMonthsViz(lang) {
      // 14 years × 12 months = 168 cells. 3 are visits.
      const visits = new Set([6, 56, 122]);
      let cells = '';
      for (let i = 0; i < 168; i++) {
        cells += `<div class="viz-month ${visits.has(i) ? 'visit' : ''}"></div>`;
      }
      const legendVisit = lang === 'no' ? '3 samvær' : '3 contacts';
      const legendEmpty = lang === 'no' ? '165 måneder uten' : '165 months without';
      return `<div class="viz-months">${cells}</div><div class="viz-months-legend"><span class="viz-legend-key"><span class="viz-legend-dot visit"></span>${legendVisit}</span><span class="viz-legend-key"><span class="viz-legend-dot"></span>${legendEmpty}</span></div>`;
    }

    function buildPetitionsViz(lang) {
      let sheets = '';
      for (let i = 0; i < 60; i++) {
        const delay = (i * 18);
        sheets += `<div class="viz-petition"><div class="stamp" style="animation-delay:${delay}ms"></div></div>`;
      }
      const caption = lang === 'no'
        ? '<strong>60 av 60 ubesvart.</strong> Staten grep ikke inn.'
        : '<strong>60 of 60 unanswered.</strong> The state did not intervene.';
      return `<div class="viz-petitions">${sheets}</div><div class="viz-petitions-caption">${caption}</div>`;
    }

    function renderCompare() {
      const wrap = document.getElementById('compare-wrap');
      const standardHead = currentLang === 'no' ? 'Det Strasbourg krever' : 'What Strasbourg requires';
      const practiceHead = currentLang === 'no' ? 'Det som faktisk skjer i Norge' : 'What actually happens in Norway';
      wrap.innerHTML = `
        <div class="compare-col standard">
          <div class="compare-head"><span class="badge"></span>${standardHead}</div>
          ${compare.map((c, i) => `<div class="compare-row" data-pair="${i}">${c[currentLang].standard}</div>`).join('')}
        </div>
        <div class="compare-col practice">
          <div class="compare-head"><span class="badge"></span>${practiceHead}</div>
          ${compare.map((c, i) => `<div class="compare-row" data-pair="${i}">${c[currentLang].practice}</div>`).join('')}
        </div>
      `;
      wrap.querySelectorAll('.compare-row').forEach(row => {
        row.addEventListener('mouseenter', () => {
          const pair = row.dataset.pair;
          wrap.querySelectorAll(`.compare-row[data-pair="${pair}"]`).forEach(r => r.classList.add('pair-hover'));
        });
        row.addEventListener('mouseleave', () => {
          wrap.querySelectorAll('.compare-row.pair-hover').forEach(r => r.classList.remove('pair-hover'));
        });
        row.addEventListener('click', () => {
          const pair = row.dataset.pair;
          if (compareFocusedPair === pair) {
            // Unfocus
            compareFocusedPair = null;
            wrap.classList.remove('has-focus');
            wrap.querySelectorAll('.compare-row.pair-focused').forEach(r => r.classList.remove('pair-focused'));
          } else {
            compareFocusedPair = pair;
            wrap.classList.add('has-focus');
            wrap.querySelectorAll('.compare-row.pair-focused').forEach(r => r.classList.remove('pair-focused'));
            wrap.querySelectorAll(`.compare-row[data-pair="${pair}"]`).forEach(r => r.classList.add('pair-focused'));
          }
        });
      });
      // Restore stagger-reveal state if compare already passed (re-render after lang change)
      if (wrap.dataset.revealed === 'true') {
        wrap.querySelectorAll('.compare-row').forEach(r => r.classList.add('in'));
      }
    }

    function setupCompareStagger() {
      const wrap = document.getElementById('compare-wrap');
      if (!wrap) return;
      let revealed = false;
      function check() {
        if (revealed) return;
        const rect = wrap.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.8 && rect.bottom > 0) {
          revealed = true;
          wrap.dataset.revealed = 'true';
          const rows = wrap.querySelectorAll('.compare-row');
          rows.forEach((row, i) => {
            const pair = parseInt(row.dataset.pair, 10);
            setTimeout(() => row.classList.add('in'), pair * 80);
          });
          document.removeEventListener('scroll', check);
        }
      }
      document.addEventListener('scroll', check, { passive: true });
      check();
    }

    // ============ I18N ============
    function setLang(lang) {
      if (!content[lang]) lang = 'no';
      currentLang = lang;
      document.documentElement.lang = lang === 'no' ? 'no' : 'en';

      document.querySelectorAll('[data-i18n]').forEach(el => {

      });

      document.title = content[lang].meta_title;
      const metaDesc = document.querySelector('meta[name="description"]');

      document.querySelectorAll('.lang-toggle button').forEach(btn => {

      renderActors();

      // Update search input placeholder if modal is open

      // Refresh scrolly year marker if present

        const state = parseInt(viz.dataset.state || '0', 10);

        const labels = (content[lang].scrolly_year_labels || '').split('|');
        if (ym && labels[state]) ym.textContent = labels[state];
