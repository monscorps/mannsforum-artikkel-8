<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Håndbok · Statens positive forpliktelser etter EMK artikkel 8</title>
  <meta name="description" content="Søkbar håndbok over Den europeiske menneskerettsdomstolens praksis om statens positive forpliktelser etter artikkel 8 i familiesaker." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white: #ffffff;
      --off-white: #f6fbfd;
      --tint: #eaf6fd;
      --ink: #0a1929;
      --body: #1a2942;
      --muted: #5c6f8a;
      --muted-soft: #93a3b8;
      --rule: #dde7ef;
      --rule-soft: #ebf1f6;
      --brand: #4db2ec;
      --brand-deep: #1a7fb8;
      --brand-darker: #0c5780;
      --brand-soft: rgba(77, 178, 236, 0.10);
      --brand-softer: rgba(77, 178, 236, 0.04);
      --accent: #e11d48;
      --accent-soft: rgba(225, 29, 72, 0.08);
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --max: 1200px;
      --max-narrow: 760px;
      --pad: clamp(20px, 4vw, 48px);
      --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--body);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      font-feature-settings: "ss01", "cv11";
    }

    ::selection { background: var(--brand); color: var(--ink); }
    a { color: inherit; }

    /* ICONS */
    .icon {
      width: 1em; height: 1em;
      vertical-align: -0.15em;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .icon-xs { width: 12px; height: 12px; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 20px; height: 20px; }
    .icon-lg { width: 28px; height: 28px; }

    /* HEADER */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: saturate(160%) blur(14px);
      -webkit-backdrop-filter: saturate(160%) blur(14px);
      border-bottom: 1px solid var(--rule);
      padding: 12px var(--pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--ink);
      min-width: 0;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
      flex: 0 0 auto;
    }

    .brand-divider { width: 1px; height: 18px; background: var(--rule); }

    .brand-tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      white-space: nowrap;
    }

    .brand-tagline::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      margin-right: 8px;
      transform: translateY(-1px);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }

    .mode-switch a {
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s var(--ease);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .mode-switch a:hover { color: var(--ink); }
    .mode-switch a.active {
      background: var(--ink);
      color: var(--white);
    }
    .mode-switch a .icon { width: 13px; height: 13px; }

    .lang-toggle {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      padding: 6px 13px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: all 0.2s var(--ease);
    }
    .lang-toggle button:hover { color: var(--ink); }
    .lang-toggle button.active { background: var(--ink); color: var(--white); }

    @media (max-width: 720px) {
      .brand-divider, .brand-tagline { display: none; }
      .mode-switch a { padding: 7px 10px; }
    }

    /* HERO */
    .hero {
      position: relative;
      padding: clamp(70px, 12vh, 130px) var(--pad) clamp(60px, 10vh, 100px);
      max-width: 1320px;
      margin: 0 auto;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--rule-soft) 1px, transparent 1px),
        linear-gradient(to bottom, var(--rule-soft) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at 75% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 75% 30%, black 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.6;
    }

    .hero-inner { position: relative; max-width: 980px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .eyebrow .icon { width: 14px; height: 14px; color: var(--brand); }

    .hero h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(34px, 5.6vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 28px;
      max-width: 18ch;
    }

    .hero h1 .accent {
      color: var(--brand-deep);
      position: relative;
      display: inline-block;
    }
    .hero h1 .accent::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0.05em;
      height: 0.18em;
      background: var(--brand);
      opacity: 0.32;
      z-index: -1;
    }

    .hero-lede {
      font-size: clamp(17px, 1.85vw, 21px);
      line-height: 1.55;
      color: var(--body);
      max-width: 42em;
      margin: 0 0 36px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 32px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      max-width: 720px;
    }

    .hero-meta-item {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-meta-item strong {
      color: var(--ink);
      font-weight: 700;
      font-size: 13px;
    }
    .hero-meta-item .dot {
      width: 5px; height: 5px;
      background: var(--brand);
      border-radius: 50%;
    }

    /* CHAPTERS */
    .chapter {
      padding: clamp(70px, 10vh, 110px) var(--pad);
    }

    .chapter > .inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .chapter.bg-alt { background: var(--off-white); }

    .chapter-head {
      max-width: var(--max-narrow);
      margin-bottom: 44px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .section-tag .icon { width: 14px; height: 14px; color: var(--brand); }

    .chapter h2 {
      font-size: clamp(26px, 3.6vw, 40px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0 0 24px;
    }

    .chapter .intro {
      font-size: clamp(16px, 1.55vw, 19px);
      line-height: 1.6;
      color: var(--body);
      margin: 0;
    }

    /* DOCTRINE BOX */
    .doctrine-box {
      padding: 38px 36px;
      background: var(--ink);
      color: var(--white);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      margin-top: 16px;
    }

    .doctrine-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 92% 10%, rgba(77, 178, 236, 0.22) 0%, transparent 55%);
      pointer-events: none;
    }

    .doctrine-box .db-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 18px;
      position: relative;
    }

    .doctrine-box h3 {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.015em;
      color: var(--white);
      margin: 0 0 16px;
      position: relative;
    }

    .doctrine-box p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 0 14px;
      max-width: 48em;
      position: relative;
    }

    .doctrine-box p:last-child { margin-bottom: 0; }

    .doctrine-box .db-cite {
      margin-top: 22px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.6);
      position: relative;
    }

    /* OBLIGATION CARDS */
    .obligations {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    @media (min-width: 720px) {
      .obligations { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1080px) {
      .obligations { grid-template-columns: repeat(3, 1fr); }
    }

    .obligation {
      padding: 26px 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      transition: all 0.2s var(--ease);
    }
    .chapter.bg-alt .obligation { background: var(--white); }

    .obligation:hover {
      transform: translateY(-3px);
      border-color: var(--brand);
      box-shadow: 0 10px 28px -12px rgba(26, 127, 184, 0.2);
    }

    .obligation .ob-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--brand-deep);
      margin-bottom: 12px;
    }

    .obligation .ob-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 16px;
    }
    .obligation .ob-icon .icon { width: 22px; height: 22px; stroke-width: 1.9; }

    .obligation h3 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 10px;
    }

    .obligation p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 14px;
    }

    .obligation .ob-cases {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--rule-soft);
    }

    .obligation .ob-case {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s var(--ease);
      font-family: inherit;
    }
    .obligation .ob-case:hover {
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-color: var(--brand);
    }

    /* CASE DATABASE */
    .db-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      align-items: center;
    }
    .chapter.bg-alt .db-controls { background: var(--white); }

    .db-search-wrap {
      flex: 1 1 280px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .db-search-wrap .icon-prefix {
      position: absolute;
      left: 12px;
      color: var(--muted-soft);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .db-search {
      flex: 1;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--rule);
      border-radius: 7px;
      font-family: inherit;
      font-size: 14px;
      background: var(--white);
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .db-search:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .db-search::placeholder { color: var(--muted-soft); }

    .db-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .db-filter {
      padding: 6px 12px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-family: inherit;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s var(--ease);
    }
    .db-filter:hover { color: var(--ink); border-color: var(--brand); }
    .db-filter.active {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
    }

    .db-stats {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .db-stats strong { color: var(--ink); }

    .case-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .case-row {
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .chapter.bg-alt .case-row { background: var(--white); }

    .case-row:hover {
      border-color: var(--brand);
    }

    .case-row.open {
      border-color: var(--brand);
      box-shadow: 0 14px 36px -14px rgba(26, 127, 184, 0.25);
    }

    .case-row.hidden { display: none; }

    .case-row-summary {
      padding: 18px 22px;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      border: none;
      background: transparent;
      text-align: left;
      font-family: inherit;
      color: inherit;
      width: 100%;
    }

    .case-row-year {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      width: 48px;
    }

    .case-row-body {
      min-width: 0;
    }

    .case-row-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .case-row-name em { font-style: italic; font-feature-settings: "ss01"; }

    .case-row-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .case-row-meta .country-chip {
      display: inline-block;
      padding: 2px 8px;
      background: var(--rule-soft);
      border-radius: 4px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .case-row-meta .country-chip.norway {
      background: rgba(225, 29, 72, 0.12);
      color: var(--accent);
    }

    .case-row-chev {
      color: var(--muted-soft);
      transition: transform 0.2s var(--ease);
    }
    .case-row.open .case-row-chev { transform: rotate(90deg); color: var(--brand); }
    .case-row-chev .icon { width: 16px; height: 16px; }

    .case-detail {
      display: none;
      padding: 4px 22px 22px 22px;
      border-top: 1px solid var(--rule);
      background: var(--off-white);
    }
    .case-row.open .case-detail { display: block; }

    .case-detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding-top: 22px;
    }

    @media (min-width: 760px) {
      .case-detail-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    }

    .cd-block .cd-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cd-block .cd-label .dot {
      width: 8px; height: 8px;
      background: var(--brand);
      border-radius: 50%;
    }

    .cd-block .cd-text {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--body);
    }

    .case-quotes {
      grid-column: 1 / -1;
      margin-top: 12px;
    }

    .case-quote-block {
      padding: 16px 20px;
      border-left: 3px solid var(--brand);
      background: var(--white);
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .case-quote-block.norway { border-left-color: var(--accent); }

    .case-quote-block .qb-para {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--brand-deep);
      margin-bottom: 10px;
    }
    .case-quote-block.norway .qb-para { color: var(--accent); }

    .case-quote-block .qb-text {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink);
      font-style: italic;
    }

    .case-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .case-tag {
      display: inline-block;
      padding: 3px 10px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .case-detail-footer {
      grid-column: 1 / -1;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }

    .case-hudoc {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px 7px 11px;
      background: var(--brand);
      color: var(--white);
      border-radius: 999px;
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .case-hudoc:hover { background: var(--brand-deep); }
    .case-hudoc .icon { width: 13px; height: 13px; stroke-width: 2.2; }

    .case-app {
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .case-app strong { color: var(--ink); font-weight: 700; }

    mark {
      background: rgba(77, 178, 236, 0.35);
      color: var(--ink);
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }

    /* HOW TO USE */
    .howto {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 16px;
    }

    @media (min-width: 760px) {
      .howto { grid-template-columns: repeat(3, 1fr); }
    }

    .howto-step {
      padding: 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      position: relative;
    }
    .chapter.bg-alt .howto-step { background: var(--white); }

    .howto-step .ht-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: 0.16em;
      margin-bottom: 12px;
    }

    .howto-step h4 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    .howto-step p {
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }

    /* FOOTER */
    .site-footer {
      padding: 64px var(--pad) 36px;
      border-top: 1px solid var(--rule);
      background: var(--off-white);
    }
    .site-footer .inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;

        id: 'zavridou', name: 'Zavridou', country: 'Kypros', countryEn: 'Cyprus', year: 2013, date: { no: '27. mars 2013', en: '27 March 2013' },
        appNo: '15948/08', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-224012', principles: ['cooperation', 'active'],
        no: {
          rettssats: 'Myndighetene kan ikke gjøre håndheving av samvær avhengig av den samarbeidsvilligheten som vises av den forelderen barnet bor hos. Staten må bruke tilgjengelige virkemidler for å beskytte familierelasjonen.',
          facts: 'Mor avskar far fra samvær med datteren over år. Kypriotiske myndigheter argumenterte for at de var avhengige av mors medvirkning for å gjennomføre samvær. EMD avviste denne logikken.',
          quotes: [

      {

        no: {

      {
        id: 'ld', name: 'L.D.', country: 'Polen', countryEn: 'Poland', year: 2014, date: { no: '14. oktober 2014', en: '14 October 2014' },

        no: {
          rettssats: 'Selv når myndighetene forsøker å løse konflikter, kan tiltak som kommer for sent innebære brudd på artikkel 8 dersom relasjonen mellom barn og forelder brytes ned i mellomtiden.',
          facts: 'Polske myndigheter iverksatte ulike tiltak for å sikre samvær mellom far og barn, men tiltakene kom for sent og var utilstrekkelige. Forholdet ble nedbrutt mens prosessen pågikk.',

        appNo: '27148/12', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-153315', principles: ['time', 'cooperation'],

          facts: 'I løpet av fjorten års rettsprosess fikk far se sønnen sin tre ganger. Kroatiske domstoler avsa flere avgjørelser om samvær, men ingen ble effektivt gjennomført. EMD fant brudd på artikkel 8.',

            { para: '§ 94', text: 'Plikten er en innsatsplikt, ikke en resultatplikt — men den innsatsen må være effektiv.' }

        },

        no: {
          rettssats: 'Kontakt mellom forelder og barn er et grunnleggende element i familielivet. Myndighetenes tiltak må vurderes etter hvor raskt de settes i verk, fordi tid kan ha irreversible konsekvenser for relasjonen.',
          facts: 'En far leverte over seksti begjæringer om håndhevelse av samvær. Ingen av dem ledet til effektivt samvær. Ungarske myndigheter ble holdt ansvarlige for å ha sviktet sin positive plikt etter artikkel 8.',

          quotes: [

          ]
        }
      },
      {
        id: 'kb', name: 'K.B. m.fl.', nameEn: 'K.B. and Others', country: 'Kroatia', countryEn: 'Croatia', year: 2017, date: { no: '14. mars 2017', en: '14 March 2017' },
        appNo: '36216/13', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-172077', principles: ['investigate', 'active', 'time'],
        no: {
          rettssats: 'Myndighetene har en positiv plikt til å iverksette tilstrekkelige og koordinerte tiltak for å opprettholde kontakt mellom forelder og barn. Barnets motstand fritar ikke staten fra denne plikten, men utløser en plikt til å undersøke årsakene og handle raskt.',
          facts: 'En far ble nektet samvær med sine barn over år. Kroatiske myndigheter forholdt seg til barnets uttrykk for motvilje uten å undersøke om denne var et resultat av påvirkning. Tiltakene var ikke tilstrekkelig koordinerte mellom domstol, barnevern og politi.',

            { para: '§ 151', text: 'Koordinert handling mellom myndigheter er en del av statens positive plikt. Fragmentert respons er svikt.' }

    /* ============ STATE ============ */
    let currentLang = 'no';
    let activeFilter = 'all';
    let searchTerm = '';

    /* ============ RENDERERS ============ */
    function getCountry(c) {
      return currentLang === 'en' ? (c.countryEn || c.country) : c.country;
    }
    function getName(c) {
      return currentLang === 'en' ? (c.nameEn || c.name) : c.name;
    }

    function deburr(s) {
      return String(s).normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
    }
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function highlight(text, query) {
      if (!query) return text;
      const tokens = deburr(query).split(/\s+/).filter(t => t.length > 1);
      if (tokens.length === 0) return text;
      let out = text;
      tokens.forEach(t => {
        const re = new RegExp('(' + escapeRegExp(t) + ')', 'gi');
        out = out.replace(re, '<mark>$1</mark>');
      });
      return out;
    }

    function renderObligations() {
      const grid = document.getElementById('obligations-grid');
      grid.innerHTML = obligations.map((o, i) => {
        const caseChips = o.cases.map(name => `<button class="ob-case" data-jump-name="${name}">${name}</button>`).join('');
        return `
          <div class="obligation">
            <div class="ob-num">P${String(i + 1).padStart(2, '0')}</div>
            <span class="ob-icon"><svg class="icon"><use href="#${o.icon}"/></svg></span>
            <h3>${o[currentLang].title}</h3>
            <p>${o[currentLang].body}</p>
            <div class="ob-cases">${caseChips}</div>
          </div>
        `;
      }).join('');
      grid.querySelectorAll('.ob-case').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.jumpName;
          const c = cases.find(cc => cc.name === name || cc.nameEn === name);
          if (c) {
            const el = document.getElementById('case-' + c.id);
            if (el) {
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              setTimeout(() => el.classList.add('open'), 400);
            }
          }
        });
      });
    }

    function renderFilters() {
      const T = content[currentLang];
      const wrap = document.getElementById('db-filters');
      const filters = [
        { id: 'all', label: T.db_filter_all },
        { id: 'norway', label: T.db_filter_norway },
        { id: 'other', label: T.db_filter_other },
        { id: 'time', label: T.db_filter_time },
        { id: 'active', label: T.db_filter_active },
        { id: 'investigate', label: T.db_filter_investigate },
        { id: 'cooperation', label: T.db_filter_cooperation },
        { id: 'arsenal', label: T.db_filter_arsenal }
      ];
      wrap.innerHTML = filters.map(f =>
        `<button class="db-filter ${f.id === activeFilter ? 'active' : ''}" data-filter="${f.id}">${f.label}</button>`
      ).join('');
      wrap.querySelectorAll('.db-filter').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter;
          renderFilters();
          renderCases();
        });
      });
    }

    function matchesFilter(c) {
      if (activeFilter === 'all') return true;
      if (activeFilter === 'norway') return c.country === 'Norge' || c.country === 'Norway';
      if (activeFilter === 'other') return c.country !== 'Norge' && c.country !== 'Norway';
      return c.principles && c.principles.includes(activeFilter);
    }

    function matchesSearch(c) {
      if (!searchTerm) return true;
      const q = deburr(searchTerm).trim();
      if (!q) return true;
      const tokens = q.split(/\s+/).filter(t => t.length > 0);
      const haystack = deburr([
        getName(c), getCountry(c), String(c.year), c.appNo,
        c[currentLang].rettssats, c[currentLang].facts,
        (c[currentLang].quotes || []).map(q => q.text).join(' ')
      ].join(' '));
      return tokens.every(t => haystack.includes(t));
    }

    function renderCases() {
      const list = document.getElementById('case-list');
      const visible = cases.filter(c => matchesFilter(c) && matchesSearch(c));
      const stats = document.getElementById('db-stats');
      const T = content[currentLang];

      if (visible.length === 0) {
        stats.textContent = T.db_stats_none;
        list.innerHTML = '';
        return;
      }
      stats.innerHTML = T.db_stats_showing.replace('%CURRENT%', `<strong>${visible.length}</strong>`).replace('%TOTAL%', `<strong>${cases.length}</strong>`);

      list.innerHTML = visible.map(c => {
        const isNorway = c.country === 'Norge' || c.country === 'Norway';
        const principleChips = c.principles.map(p => {
          const o = obligations.find(x => x.id === p);
          return o ? `<span class="case-tag">${o[currentLang].title}</span>` : '';
        }).join('');
        const quotes = (c[currentLang].quotes || []).map(q => `
          <div class="case-quote-block ${isNorway ? 'norway' : ''}">
            <div class="qb-para">${q.para}</div>
            <div class="qb-text">${highlight(q.text, searchTerm)}</div>
          </div>
        `).join('');
        const facts = highlight(c[currentLang].facts || '', searchTerm);
        const rettssats = highlight(c[currentLang].rettssats || '', searchTerm);
        const nameDisplay = `<em>${highlight(getName(c), searchTerm)}</em> mot ${highlight(getCountry(c), searchTerm)}`;

        return `
          <div class="case-row" id="case-${c.id}">
            <button class="case-row-summary" type="button" aria-expanded="false">
              <span class="case-row-year">${c.year}</span>
              <div class="case-row-body">
                <div class="case-row-name">${nameDisplay}</div>
                <div class="case-row-meta">
                  <span class="country-chip ${isNorway ? 'norway' : ''}">${getCountry(c)}</span>
                  <span>${c.date[currentLang]}</span>
                  <span>App. no. ${c.appNo}</span>
                </div>
              </div>
              <span class="case-row-chev" aria-hidden="true"><svg class="icon"><use href="#i-chevron-right"/></svg></span>
            </button>
            <div class="case-detail">
              <div class="case-detail-grid">
                <div class="cd-block">
                  <div class="cd-label"><span class="dot"></span>${currentLang === 'no' ? 'Rettssats' : 'Holding'}</div>
                  <div class="cd-text">${rettssats}</div>
                </div>
                <div class="cd-block">
                  <div class="cd-label"><span class="dot"></span>${currentLang === 'no' ? 'Saken kort' : 'Facts'}</div>
                  <div class="cd-text">${facts}</div>
                </div>
                <div class="case-quotes">${quotes}</div>
                <div class="case-detail-footer">
                  <a class="case-hudoc" href="${c.hudoc}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                    <svg class="icon"><use href="#i-external"/></svg>${currentLang === 'no' ? 'Les dommen på HUDOC' : 'Read on HUDOC'}
                  </a>
                  <div class="case-tags">${principleChips}</div>
                  <span class="case-app">App. no. <strong>${c.appNo}</strong></span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.case-row-summary').forEach(btn => {
        btn.addEventListener('click', () => {
          const row = btn.parentElement;
          const open = row.classList.toggle('open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      });
    }

    function renderHowto() {
      const T = currentLang;
      const grid = document.getElementById('howto-grid');
      const steps = T === 'no' ? [
        { num: '01', h: 'Identifiser plikten', p: 'Start i kapittel «Forpliktelsene» og finn hvilken positiv plikt din sak handler om — tid, aktiv inngripen, undersøkelse, ikke-avhengighet, eller rettslig arsenal.' },
        { num: '02', h: 'Finn relevante dommer', p: 'Bruk filter på plikttype, eller søk på stikkord, paragraf eller sitat. Du kan også filtrere etter saker mot Norge spesifikt.' },
        { num: '03', h: 'Sitér primærkilden', p: 'Hver dom har lenke til HUDOC. Sitér paragrafer og sjekk originalen. Håndboken hjelper deg å finne frem — den erstatter ikke domsteksten.' }
      ] : [
        { num: '01', h: 'Identify the obligation', p: 'Start in the "Obligations" chapter and identify which positive duty your case is about — time, active intervention, investigation, non-dependency, or legal arsenal.' },
        { num: '02', h: 'Find relevant judgments', p: 'Use the obligation-type filter, or search by keyword, paragraph or quote. You can also filter for cases against Norway specifically.' },
        { num: '03', h: 'Cite the primary source', p: 'Each judgment links to HUDOC. Cite paragraphs and check the original. The handbook helps you find your way — it does not replace the judgment text.' }
      ];
      grid.innerHTML = steps.map(s => `
        <div class="howto-step">
          <div class="ht-num">${s.num}</div>
          <h4>${s.h}</h4>
          <p>${s.p}</p>
        </div>
      `).join('');
    }

    function renderMetaCounts() {
      document.getElementById('meta-cases').textContent = cases.length;
      document.getElementById('meta-obligations').textContent = obligations.length;
      document.getElementById('meta-norway').textContent = cases.filter(c => c.country === 'Norge' || c.country === 'Norway').length;
    }

    /* ============ I18N ============ */
    function setLang(lang) {
      if (!content[lang]) lang = 'no';
      currentLang = lang;
      document.documentElement.lang = lang === 'no' ? 'no' : 'en';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (content[lang][key] !== undefined) el.innerHTML = content[lang][key];
      });

      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        const active = btn.dataset.lang === lang;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      const searchInput = document.getElementById('db-search');
      if (searchInput) searchInput.placeholder = content[lang].db_search_placeholder || '';

      renderObligations();
      renderFilters();
      renderHowto();
      renderCases();
      renderMetaCounts();

      localStorage.setItem('handbook-lang', lang);
    }

    /* ============ INIT ============ */
    (function init() {
      const saved = localStorage.getItem('handbook-lang') || localStorage.getItem('lang');
      const browser = (navigator.language || 'en').toLowerCase();
      const isNorwegian = browser.startsWith('no') || browser.startsWith('nb') || browser.startsWith('nn');
      const initialLang = saved || (isNorwegian ? 'no' : 'en');

      setLang(initialLang);

      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });

      const searchInput = document.getElementById('db-search');
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderCases();
      });
    })();
  </script>
