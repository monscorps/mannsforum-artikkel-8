<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Håndbok · Statens positive forpliktelser etter EMK artikkel 8</title>
  <meta name="description" content="Søkbar håndbok over Den europeiske menneskerettsdomstolens praksis om statens positive forpliktelser etter artikkel 8 i familiesaker." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="pdf-text.js"></script>
  <style>
    :root {
      --white: #ffffff;
      --off-white: #f6fbfd;
      --tint: #eaf6fd;
      --ink: #0a1929;
      --body: #1a2942;
      --muted: #5c6f8a;
      --muted-soft: #93a3b8;
      --rule: #dde7ef;
      --rule-soft: #ebf1f6;
      --brand: #4db2ec;
      --brand-deep: #1a7fb8;
      --brand-darker: #0c5780;
      --brand-soft: rgba(77, 178, 236, 0.10);
      --brand-softer: rgba(77, 178, 236, 0.04);
      --accent: #e11d48;
      --accent-soft: rgba(225, 29, 72, 0.08);
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --max: 1200px;
      --max-narrow: 760px;
      --pad: clamp(20px, 4vw, 48px);
      --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--body);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      font-feature-settings: "ss01", "cv11";
    }

    ::selection { background: var(--brand); color: var(--ink); }
    a { color: inherit; }

    /* ICONS */
    .icon {
      width: 1em; height: 1em;
      vertical-align: -0.15em;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .icon-xs { width: 12px; height: 12px; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 20px; height: 20px; }
    .icon-lg { width: 28px; height: 28px; }

    /* ECHR BANNER */
    .echr-banner {
      background: linear-gradient(180deg, #061325 0%, #0a1929 100%);
      color: var(--white);
      padding: 22px var(--pad);
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(77, 178, 236, 0.15);
    }

    .echr-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 100% 50%, rgba(77, 178, 236, 0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .echr-banner-inner {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 22px;
      position: relative;
    }

    .echr-banner-icon {
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(77, 178, 236, 0.45);
      border-radius: 12px;
      color: var(--brand);
      background: rgba(77, 178, 236, 0.06);
    }
    .echr-banner-icon .icon {
      width: 28px;
      height: 28px;
      stroke-width: 1.7;
    }

    .echr-banner-text {
      flex: 1;
      min-width: 0;
    }

    .echr-banner-eyebrow {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(77, 178, 236, 0.9);
      margin-bottom: 5px;
    }

    .echr-banner-title {
      font-size: clamp(16px, 1.7vw, 21px);
      font-weight: 600;
      letter-spacing: -0.005em;
      line-height: 1.25;
      color: var(--white);
    }
    .echr-banner-title strong {
      font-weight: 700;
      color: var(--white);
    }

    @media (max-width: 720px) {
      .echr-banner { padding: 18px var(--pad); }
      .echr-banner-inner { gap: 16px; }
      .echr-banner-icon { width: 44px; height: 44px; }
      .echr-banner-icon .icon { width: 22px; height: 22px; }
      .echr-banner-eyebrow { font-size: 9.5px; }
      .echr-banner-title { font-size: 14.5px; }
    }

    /* HEADER */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: saturate(160%) blur(14px);
      -webkit-backdrop-filter: saturate(160%) blur(14px);
      border-bottom: 1px solid var(--rule);
      padding: 12px var(--pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--ink);
      min-width: 0;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
      flex: 0 0 auto;
    }

    .brand-divider { width: 1px; height: 18px; background: var(--rule); }

    .brand-tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      white-space: nowrap;
    }

    .brand-tagline::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      margin-right: 8px;
      transform: translateY(-1px);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }

    .mode-switch a {
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s var(--ease);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .mode-switch a:hover { color: var(--ink); }
    .mode-switch a.active {
      background: var(--ink);
      color: var(--white);
    }
    .mode-switch a .icon { width: 13px; height: 13px; }

    .lang-toggle {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      padding: 6px 13px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: all 0.2s var(--ease);
    }
    .lang-toggle button:hover { color: var(--ink); }
    .lang-toggle button.active { background: var(--ink); color: var(--white); }

    @media (max-width: 720px) {
      .brand-divider, .brand-tagline { display: none; }
      .mode-switch a { padding: 7px 10px; }
    }

    /* SEARCH HERO */
    .search-hero {
      position: relative;
      padding: clamp(48px, 8vh, 80px) var(--pad) clamp(30px, 5vh, 50px);
      max-width: 1320px;
      margin: 0 auto;
      overflow: hidden;
    }
    .search-hero-inner { position: relative; max-width: 880px; margin: 0 auto; text-align: center; }
    .search-hero .hero-lede {
      font-size: clamp(16px, 1.6vw, 19px);
      line-height: 1.55;
      color: var(--body);
      max-width: 52em;
      margin: 0 auto 40px;
      font-weight: 400;
      letter-spacing: -0.005em;
    }

    .big-search-wrap {
      position: relative;
      max-width: 680px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
    }
    .big-search-icon {
      position: absolute;
      left: 24px;
      width: 22px;
      height: 22px;
      color: var(--brand-deep);
      pointer-events: none;
    }
    .big-search {
      flex: 1;
      padding: 20px 68px 20px 60px;
      border: 1.5px solid var(--rule);
      border-radius: 14px;
      font-family: inherit;
      font-size: 17px;
      color: var(--ink);
      background: var(--white);
      box-shadow: 0 8px 28px -8px rgba(10, 25, 41, 0.08), 0 2px 6px rgba(10, 25, 41, 0.04);
      transition: all 0.2s var(--ease);
      width: 100%;
      letter-spacing: -0.005em;
      font-weight: 500;
    }
    .big-search:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 12px 32px -10px rgba(26, 127, 184, 0.3), 0 0 0 4px var(--brand-soft);
      transform: translateY(-1px);
    }
    .big-search::placeholder { color: var(--muted-soft); font-weight: 400; }
    .big-search-kbd {
      position: absolute;
      right: 22px;
      padding: 3px 9px;
      background: var(--rule-soft);
      border: 1px solid var(--rule);
      border-radius: 5px;
      font-family: ui-monospace, monospace;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      pointer-events: none;
    }

    .search-suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
    }
    .search-suggestions .ss-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-right: 4px;
      align-self: center;
    }
    .ss-chip {
      padding: 6px 11px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 5px;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--body);
      cursor: pointer;
      transition: all 0.15s var(--ease);
      letter-spacing: -0.005em;
    }
    .ss-chip:hover {
      background: var(--brand-soft);
      border-color: var(--brand);
      color: var(--brand-deep);
    }
    .ss-chip:active { transform: translateY(1px); }

    .search-hero .db-filters {
      justify-content: center;
      margin-top: 8px;
    }

    /* RESULTS SECTION */
    .results-section {
      padding: clamp(20px, 4vh, 40px) var(--pad) clamp(60px, 10vh, 100px);
    }
    .results-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .case-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 760px) {
      .case-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
    }

    /* legacy hero kept for compatibility but unused */
    .hero { display: none; }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--rule-soft) 1px, transparent 1px),
        linear-gradient(to bottom, var(--rule-soft) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at 75% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 75% 30%, black 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.6;
    }

    .hero-inner { position: relative; max-width: 980px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .eyebrow .icon { width: 14px; height: 14px; color: var(--brand); }

    .hero h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(34px, 5.6vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 28px;
      max-width: 18ch;
    }

    .hero h1 .accent {
      color: var(--brand-deep);
      position: relative;
      display: inline-block;
    }
    .hero h1 .accent::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0.05em;
      height: 0.18em;
      background: var(--brand);
      opacity: 0.32;
      z-index: -1;
    }

    .hero-lede {
      font-size: clamp(17px, 1.85vw, 21px);
      line-height: 1.55;
      color: var(--body);
      max-width: 42em;
      margin: 0 0 36px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 32px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      max-width: 720px;
    }

    .hero-meta-item {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-meta-item strong {
      color: var(--ink);
      font-weight: 700;
      font-size: 13px;
    }
    .hero-meta-item .dot {
      width: 5px; height: 5px;
      background: var(--brand);
      border-radius: 50%;
    }

    /* CHAPTERS */
    .chapter {
      padding: clamp(70px, 10vh, 110px) var(--pad);
    }

    .chapter > .inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .chapter.bg-alt { background: var(--off-white); }

    .chapter-head {
      max-width: var(--max-narrow);
      margin-bottom: 44px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .section-tag .icon { width: 14px; height: 14px; color: var(--brand); }

    .chapter h2 {
      font-size: clamp(26px, 3.6vw, 40px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0 0 24px;
    }

    .chapter .intro {
      font-size: clamp(16px, 1.55vw, 19px);
      line-height: 1.6;
      color: var(--body);
      margin: 0;
    }

    /* DOCTRINE BOX */
    .doctrine-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 16px;
    }
    @media (min-width: 880px) {
      .doctrine-stack { grid-template-columns: 1fr 1fr; gap: 20px; }
    }

    .doctrine-box {
      padding: 38px 36px;
      background: var(--ink);
      color: var(--white);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      margin-top: 16px;
    }

    .doctrine-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 92% 10%, rgba(77, 178, 236, 0.22) 0%, transparent 55%);
      pointer-events: none;
    }

    .doctrine-box .db-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 18px;
      position: relative;
    }

    .doctrine-box h3 {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.015em;
      color: var(--white);
      margin: 0 0 16px;
      position: relative;
    }

    .doctrine-box p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 0 14px;
      max-width: 48em;
      position: relative;
    }

    .doctrine-box p:last-child { margin-bottom: 0; }

    .doctrine-box .db-cite {
      margin-top: 22px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.6);
      position: relative;
    }

    .doctrine-box-secondary {
      background: var(--white);
      color: var(--ink);
      border: 1px solid var(--rule);
    }
    .doctrine-box-secondary::before {
      background: radial-gradient(circle at 92% 10%, rgba(77, 178, 236, 0.18) 0%, transparent 55%);
    }
    .doctrine-box-secondary .db-label { color: var(--brand-deep); }
    .doctrine-box-secondary h3 { color: var(--ink); }
    .doctrine-box-secondary p { color: var(--body); }
    .doctrine-box-secondary .db-cite { color: var(--muted); }

    /* OBLIGATION CARDS */
    .obligations {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    @media (min-width: 720px) {
      .obligations { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1080px) {
      .obligations { grid-template-columns: repeat(3, 1fr); }
    }

    .obligation {
      padding: 26px 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      transition: all 0.2s var(--ease);
    }
    .chapter.bg-alt .obligation { background: var(--white); }

    .obligation:hover {
      transform: translateY(-3px);
      border-color: var(--brand);
      box-shadow: 0 10px 28px -12px rgba(26, 127, 184, 0.2);
    }

    .obligation {
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: inherit;
      width: 100%;
    }

    .obligation:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 3px;
    }

    .obligation .ob-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .obligation .ob-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--brand-deep);
    }

    .obligation .ob-count {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
    }

    .obligation .ob-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 16px;
    }
    .obligation .ob-icon .icon { width: 22px; height: 22px; stroke-width: 1.9; }

    .obligation h3 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 10px;
    }

    .obligation p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 14px;
    }

    .obligation .ob-cases {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--rule-soft);
    }

    .obligation .ob-case {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s var(--ease);
      font-family: inherit;
    }
    .obligation .ob-case:hover {
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-color: var(--brand);
    }

    /* CASE DATABASE */
    .db-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      align-items: center;
    }
    .chapter.bg-alt .db-controls { background: var(--white); }

    .db-search-wrap {
      flex: 1 1 280px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .db-search-wrap .icon-prefix {
      position: absolute;
      left: 12px;
      color: var(--muted-soft);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .db-search {
      flex: 1;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--rule);
      border-radius: 7px;
      font-family: inherit;
      font-size: 14px;
      background: var(--white);
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .db-search:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .db-search::placeholder { color: var(--muted-soft); }

    .db-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .db-filter {
      padding: 6px 12px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-family: inherit;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s var(--ease);
    }
    .db-filter:hover { color: var(--ink); border-color: var(--brand); }
    .db-filter.active {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
    }

    .db-stats {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .db-stats strong { color: var(--ink); }

    .case-row {
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.18s, box-shadow 0.22s, transform 0.22s;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 2px rgba(10, 25, 41, 0.04);
    }

    .case-row:hover {
      border-color: rgba(77, 178, 236, 0.6);
      transform: translateY(-3px);
      box-shadow: 0 16px 40px -16px rgba(10, 25, 41, 0.18), 0 4px 8px rgba(10, 25, 41, 0.04);
    }

    .case-row.open {
      border-color: var(--brand);
      box-shadow: 0 18px 44px -16px rgba(26, 127, 184, 0.3);
      grid-column: 1 / -1;
      transform: none;
    }

    .case-sep {
      color: var(--muted);
      font-weight: 500;
      margin: 0 2px;
    }

    .case-row.hidden { display: none; }

    .case-row-preview {
      padding: 18px 22px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--body);
      border-top: 1px solid var(--rule-soft);
    }
    .case-row-preview-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .case-row.open .case-row-preview { display: none; }

    .case-keywords {
      padding: 0 22px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .case-row.open .case-keywords { display: none; }
    .keyword-chip {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    .keyword-chip.match {
      background: var(--brand-soft);
      color: var(--brand-deep);
      font-weight: 600;
    }

    .case-row-summary {
      padding: 20px 24px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 18px;
      align-items: center;
      border: none;
      background: transparent;
      text-align: left;
      font-family: inherit;
      color: inherit;
      width: 100%;
    }

    .case-row-year {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand-deep);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .case-row-flag {
      display: inline-block;
      margin-right: 10px;
      vertical-align: -3px;
      line-height: 1;
    }
    .flag-svg {
      display: inline-block;
      height: 14px;
      width: auto;
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(10, 25, 41, 0.08);
      vertical-align: middle;
    }
    .case-row-flag .flag-svg { height: 16px; }
    .cr-flag .flag-svg { height: 22px; box-shadow: 0 0 0 1px rgba(10, 25, 41, 0.12); }

    .case-row-body {
      min-width: 0;
    }

    .case-row-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .case-row-name em { font-style: italic; font-feature-settings: "ss01"; }

    .case-row-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.02em;
      align-items: center;
    }

    .case-row-meta .country-chip {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .case-row-meta .country-chip.norway {
      background: rgba(225, 29, 72, 0.12);
      color: var(--accent);
    }
    .case-row-meta .meta-app {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 11px;
      color: var(--muted-soft);
      letter-spacing: 0;
    }
    .case-row-meta .meta-divider {
      color: var(--muted-soft);
      opacity: 0.5;
    }

    .case-row-chev {
      color: var(--muted-soft);
      transition: transform 0.2s var(--ease);
    }
    .case-row.open .case-row-chev { transform: rotate(90deg); color: var(--brand); }
    .case-row-chev .icon { width: 16px; height: 16px; }

    .case-detail {
      display: none;
      padding: 4px 22px 22px 22px;
      border-top: 1px solid var(--rule);
      background: var(--off-white);
    }
    .case-row.open .case-detail { display: block; }

    .case-detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding-top: 22px;
    }

    @media (min-width: 760px) {
      .case-detail-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    }

    .cd-block .cd-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cd-block .cd-label .dot {
      width: 8px; height: 8px;
      background: var(--brand);
      border-radius: 50%;
    }

    .cd-block .cd-text {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--body);
    }

    .case-quotes {
      grid-column: 1 / -1;
      margin-top: 12px;
    }

    .case-quote-block {
      padding: 18px 22px;
      border: 2px solid var(--accent);
      background: var(--white);
      border-radius: 6px;
      margin-bottom: 12px;
      position: relative;
    }

    .case-quote-block::before {
      content: 'VERBATIM';
      position: absolute;
      top: -9px;
      left: 16px;
      background: var(--accent);
      color: var(--white);
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.18em;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .case-quote-block .qb-para {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 10px;
      margin-top: 2px;
    }

    .case-quote-block .qb-text {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink);
      font-style: italic;
    }

    .case-quote-block .qb-lang {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed var(--rule);
    }

    .case-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .case-tag {
      display: inline-block;
      padding: 4px 11px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      transition: all 0.15s var(--ease);
    }
    .case-tag:hover {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
    }

    /* CASE READER MODAL (full case in a sheet) */
    .cr-modal {
      position: fixed;
      inset: 0;
      z-index: 320;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .cr-modal[hidden] { display: none; }

    .cr-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 25, 41, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: backdropIn 0.2s ease;
    }

    .cr-sheet {
      position: relative;
      background: var(--white);
      width: min(880px, 100%);
      margin-left: auto;
      box-shadow: -20px 0 60px -10px rgba(10, 25, 41, 0.35);
      overflow-y: auto;
      animation: sheetSlideIn 0.32s var(--ease);
      display: flex;
      flex-direction: column;
    }

    @keyframes sheetSlideIn {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .cr-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      padding: 16px 28px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .cr-head-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-deep);
    }

    .cr-close {
      background: var(--rule-soft);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .cr-close:hover { background: var(--rule); color: var(--ink); }
    .cr-close .icon { width: 16px; height: 16px; }

    .cr-body {
      padding: 36px 40px 48px;
    }

    .cr-case-head {
      padding-bottom: 22px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--rule);
    }

    .cr-case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 12px;
      align-items: center;
    }
    .cr-case-meta .cr-year {
      font-size: 28px;
      font-weight: 800;
      color: var(--brand-deep);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-right: 4px;
    }
    .cr-case-meta .cr-flag { font-size: 22px; }
    .cr-case-meta .cr-app {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted-soft);
    }

    .cr-case-name {
      font-size: clamp(24px, 3.4vw, 34px);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--ink);
      line-height: 1.15;
      margin: 0 0 4px;
    }
    .cr-case-name em { font-style: italic; font-feature-settings: "ss01"; }

    .cr-section {
      margin-top: 26px;
    }
    .cr-section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cr-section-label .icon { width: 14px; height: 14px; color: var(--brand); }

    .cr-text {
      font-size: 16px;
      line-height: 1.65;
      color: var(--body);
    }

    .cr-quote {
      padding: 22px 26px;
      border: 2px solid var(--accent);
      background: rgba(225, 29, 72, 0.04);
      border-radius: 8px;
      position: relative;
      margin-bottom: 14px;
    }
    .cr-quote::before {
      content: 'VERBATIM';
      position: absolute;
      top: -10px;
      left: 18px;
      background: var(--accent);
      color: var(--white);
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.18em;
      padding: 3px 9px;
      border-radius: 3px;
    }
    .cr-quote-para {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin: 2px 0 12px;
    }
    .cr-quote-text {
      font-size: 16px;
      line-height: 1.6;
      color: var(--ink);
      font-style: italic;
    }
    .cr-quote-lang {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--rule);
    }

    .cr-principles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .cr-principle-tag {
      display: inline-block;
      padding: 6px 12px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      transition: all 0.15s var(--ease);
    }
    .cr-principle-tag:hover {
      background: var(--brand);
      color: var(--white);
    }

    /* PDF READER PANEL inside case modal */
    .pdf-panel {
      margin-top: 28px;
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
      background: var(--white);
    }
    .pdf-panel-head {
      padding: 14px 18px;
      background: var(--off-white);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pdf-panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      flex: 0 0 auto;
    }
    .pdf-panel-kind {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .pdf-panel-kind.full { background: rgba(22, 163, 74, 0.12); color: #15803d; }
    .pdf-panel-kind.press, .pdf-panel-kind.summary { background: rgba(245, 158, 11, 0.12); color: #b45309; }

    .pdf-search-wrap {
      flex: 1 1 200px;
      position: relative;
      display: flex;
      align-items: center;
    }
    .pdf-search-wrap .icon {
      position: absolute;
      left: 10px;
      width: 14px;
      height: 14px;
      color: var(--muted-soft);
      pointer-events: none;
    }
    .pdf-search {
      flex: 1;
      padding: 7px 10px 7px 30px;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: var(--white);
      color: var(--ink);
    }
    .pdf-search:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .pdf-search::placeholder { color: var(--muted-soft); }
    .pdf-match-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .pdf-match-count strong { color: var(--accent); font-weight: 700; }

    .pdf-body {
      max-height: 50vh;
      overflow-y: auto;
      padding: 18px 22px;
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--body);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .pdf-body mark {
      background: var(--accent);
      color: var(--white);
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }
    .pdf-body mark.current {
      background: #fbbf24;
      color: var(--ink);
      outline: 2px solid var(--accent);
    }

    .pdf-empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .cr-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
      padding-top: 22px;
      border-top: 1px solid var(--rule);
    }

    .cr-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .cr-action-hudoc {
      background: var(--ink);
      color: var(--white);
    }
    .cr-action-hudoc:hover { background: var(--brand-deep); transform: translateY(-1px); }
    .cr-action-hudoc .icon { width: 13px; height: 13px; color: var(--brand); stroke-width: 2.2; }
    .cr-action-copy {
      background: var(--white);
      color: var(--brand-deep);
      border-color: var(--rule);
    }
    .cr-action-copy:hover { border-color: var(--brand); background: var(--brand-soft); }
    .cr-action-copy.done { background: var(--brand); color: var(--white); border-color: var(--brand); }
    .cr-action-copy .icon { width: 13px; height: 13px; stroke-width: 2.2; }

    @media (max-width: 720px) {
      .cr-sheet { width: 100%; }
      .cr-body { padding: 24px 22px 36px; }
    }

    /* OBLIGATION MODAL */
    .ob-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 20px;
    }
    .ob-modal[hidden] { display: none; }

    .ob-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 25, 41, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: backdropIn 0.2s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .ob-modal-card {
      position: relative;
      background: var(--white);
      border-radius: 14px;
      width: 100%;
      max-width: 640px;
      max-height: calc(100vh - 80px);
      overflow: auto;
      box-shadow: 0 30px 60px -15px rgba(10, 25, 41, 0.4);
      animation: modalIn 0.28s var(--ease);
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(-14px) scale(0.97); } to { opacity: 1; transform: none; } }

    .ob-modal-head {
      padding: 26px 28px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .ob-modal-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--brand);
      color: var(--white);
      flex: 0 0 auto;
    }
    .ob-modal-icon .icon { width: 22px; height: 22px; }

    .ob-modal-close {
      background: var(--rule-soft);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .ob-modal-close:hover { background: var(--rule); color: var(--ink); }
    .ob-modal-close .icon { width: 14px; height: 14px; }

    .ob-modal-body {
      padding: 14px 28px 28px;
    }

    .ob-modal-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 8px;
      margin-top: 14px;
    }

    .ob-modal-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--ink);
      margin: 0 0 12px;
      line-height: 1.25;
    }

    .ob-modal-body-text {
      font-size: 15px;
      line-height: 1.55;
      color: var(--body);
      margin-bottom: 22px;
    }

    .ob-modal-actionables {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: act;
    }
    .ob-modal-actionables li {
      counter-increment: act;
      padding: 14px 0 14px 38px;
      position: relative;
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink);
      border-top: 1px solid var(--rule-soft);
    }
    .ob-modal-actionables li:first-child { border-top: none; }
    .ob-modal-actionables li::before {
      content: counter(act, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--brand-deep);
      letter-spacing: 0.06em;
    }

    .ob-modal-cases {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .ob-modal-cases strong { color: var(--ink); }

    .case-detail-footer {
      grid-column: 1 / -1;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }

    .case-finn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 12px;
      background: var(--ink);
      color: var(--white);
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.15s;
    }
    .case-finn:hover { background: var(--brand-deep); transform: translateY(-1px); }
    .case-finn .icon { width: 13px; height: 13px; stroke-width: 2.2; color: var(--brand); }

    .case-hudoc-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px 7px 10px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--rule);
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .case-hudoc-secondary:hover { color: var(--brand-deep); border-color: var(--brand); }
    .case-hudoc-secondary .icon { width: 12px; height: 12px; stroke-width: 2.2; }

    .case-app {

    .case-copy {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px 7px 11px;
      background: var(--white);
      color: var(--brand-deep);
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s var(--ease);
    }
    .case-copy:hover { border-color: var(--brand); background: var(--brand-soft); }
    .case-copy.done { background: var(--brand); color: var(--white); border-color: var(--brand); }
    .case-copy .icon { width: 12px; height: 12px; stroke-width: 2.2; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      padding: 11px 20px;
      background: var(--ink);
      color: var(--white);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      box-shadow: 0 10px 30px -10px rgba(10, 25, 41, 0.4);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast .icon { width: 14px; height: 14px; color: var(--brand); vertical-align: -3px; margin-right: 6px; }

    mark {
      background: rgba(77, 178, 236, 0.35);
      color: var(--ink);
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }

    /* HOW TO USE */
    .howto {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 16px;
    }

    @media (min-width: 760px) {
      .howto { grid-template-columns: repeat(3, 1fr); }
    }

    .howto-step {
      padding: 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      position: relative;
    }
    .chapter.bg-alt .howto-step { background: var(--white); }

    .howto-step .ht-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: 0.16em;
      margin-bottom: 12px;
    }

    .howto-step h4 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    .howto-step p {
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }

    /* FOOTER */
    .site-footer {
      padding: 64px var(--pad) 36px;
      border-top: 1px solid var(--rule);
      background: var(--off-white);
    }
    .site-footer .inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .site-footer p {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }
    .site-footer a {
      color: var(--brand-deep);
      text-decoration: underline;
      text-decoration-color: var(--brand-soft);
      text-underline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .obligation:hover, .case-row.open { transform: none; }
    }

          en: ['child resistance', 'duty to investigate', 'manipulation', 'loyalty conflict', 'parental alienation', 'Moldovan authorities', 'child refuses contact', 'child says no', 'child veto', 'no veto for child', 'child voice', 'relational context', 'investigate the cause', 'parent denied contact', 'parental alienation syndrome', 'case against Moldova', 'hearing the child', 'child welfare expert', 'expert assessment', 'investigate why child resists', 'examine manipulation', 'examine loyalty conflict', 'contact denied based on child wish', 'child wishes', 'manipulated child', 'mother influences child', 'father influences child', 'parent influences', 'contact denial', 'parental dispute', 'contact obstruction via child', 'duty of investigation', 'analyze relational context', 'family life protection', 'contextual analysis duty', 'resistance not decisive', 'resistance must be investigated', 'quality of child expert', 'parental conflict affects child', 'manipulating child views', 'duty to look behind resistance', 'underlying reasons']

        no: {
          rettssats: 'Barnets motstand mot samvær kan ikke alene være avgjørende dersom det foreligger indikasjoner på påvirkning eller lojalitetskonflikt. Myndighetene må analysere den relasjonelle konteksten.',
          facts: 'En far ble nektet samvær av moren over år. Barnet uttrykte motvilje mot samvær, og dette ble av moldovske myndigheter behandlet som avgjørende. EMD fant at årsaken til motviljen ikke var tilstrekkelig undersøkt.',
          quotes: [
            { para: '§§ 64-65', text: 'Myndighetene har en plikt til å undersøke årsakene til barnets motvilje. Det er ikke nok å registrere hva barnet sier — relasjonell kontekst, påvirkning og lojalitetskonflikt må vurderes.' }
          ]
        },
        en: {
          rettssats: 'A child\'s resistance to contact cannot alone be decisive when there are indications of manipulation or loyalty conflict. Authorities must analyse the relational context.',
          facts: 'A father was denied contact by the mother for years. The child expressed resistance to contact, which Moldovan authorities treated as decisive. The Court found the cause of the resistance had not been sufficiently investigated.',
          quotes: [
            { para: '§ 64', text: 'However, the national authorities\' obligation to take measures to facilitate a reunion is not absolute, since a reunion between a parent and a child who has lived with other persons for some time may not be able to take place immediately, and may require preparatory measures. What is therefore decisive is whether the domestic authorities have taken all necessary steps to facilitate contact that can reasonably be demanded in the special circumstances of each case.' },
            { para: '§ 65', text: 'While the Court\'s case-law requires children\'s views to be taken into account, those views are not necessarily immutable, and children\'s objections, which must be given due weight, are not necessarily sufficient to override the parents\' interests, especially their interests in having regular contact with their child. In particular, children having the right to express their own views should not be interpreted as effectively giving them an unconditional veto power without any other factors being considered and an examination being carried out to determine their best interests.' },
            { para: '§ 66', text: 'In cases concerning a person\'s relationship with his or her child, there is a duty to exercise exceptional diligence, in view of the risk that the passage of time may result in a de facto determination of the matter.' },
            { para: '§ 70', text: 'After the first psychological evaluation of the children in January 2014 there was no psychological follow-up for almost ten months, despite the applicant complaining on numerous occasions that P.\'s manipulation of the children was aimed at turning them against her. When a new evaluation in November 2014 revealed that the children resented their mother, the DSAFP recommended, inter alia, that the children be temporarily separated from both parents in order to receive psychological assistance away from the parents\' influence. That recommendation was never followed.' },
            { para: '§ 79', text: 'The Court considers that the alienation of the applicant\'s children, of which the applicant complained much earlier than any judgment concerning their custody was adopted, was a major factor impeding the enforcement of the judgment of 24 June 2015. Therefore, the authorities\' failure to react to the applicant\'s complaints about alienation and to examine the custody case in an urgent matter must be seen as having substantially contributed to the eventual difficulties in enforcing the judgment.' },
            { para: '§ 80', text: 'The domestic authorities did not act with the exceptional diligence required of them or discharge their positive obligations under Article 8 of the Convention. There has therefore been a violation of Article 8 of the Convention in the present case.' }
          ]
        }
      },
      {
        id: 'ld', name: 'L.D.', country: 'Polen', countryEn: 'Poland', year: 2025, date: { no: '13. februar 2025', en: '13 February 2025' },
        appNo: '12119/14', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-241741', principles: ['time', 'effective'],
        tags: {
          no: ['sen inngripen', 'tiltak for sent', 'ineffektive tiltak', 'polske myndigheter', 'sak mot Polen', 'forelder nektet samvær', 'brudd på relasjonen', 'effektivitet', 'tidsfaktor', 'forsinket reaksjon', 'tilstrekkelige tiltak', 'utilstrekkelige tiltak', 'relasjon nedbrutt', 'forsøkte men feilet', 'staten prøvde uten å lykkes', 'tiltak virket ikke', 'avgjørende ikke om man handlet, men om man lyktes', 'innsatsplikt vs resultat', 'effektivitetsstandard', 'systematisk svikt', 'svikt over tid', 'manglende koordinering', 'manglende eskalering', 'foreldretvist', 'samværsnektelse', 'samværssvikt', 'manglende familievernoppfølging', 'manglende mekling', 'manglende håndhevelse', 'tidsbruk i barnesaker', 'foreldre-barn forhold svekkes', 'irreversible konsekvenser', 'tap av tid', 'forsinkelse skader relasjonen', 'sen tilbakeføring', 'effective measures', 'tiltak må fungere i praksis', 'innsats er ikke nok', 'resultatorientert vurdering', 'relasjon ødelegges av tid', 'foreldreansvar tapt', 'years lost'],
          en: ['late intervention', 'measures too late', 'ineffective measures', 'Polish authorities', 'case against Poland', 'parent denied contact', 'relationship breakdown', 'effectiveness', 'time factor', 'delayed response', 'inadequate measures', 'relationship destroyed', 'tried but failed', 'state tried without succeeding', 'measures did not work', 'decisive is not whether they acted', 'effort vs result', 'effectiveness standard', 'systematic failure', 'long-term failure', 'lack of coordination', 'failure to escalate', 'parental dispute', 'contact denial', 'contact failure', 'family counselling failure', 'mediation failure', 'failure to enforce', 'time use in family cases', 'parent-child relationship weakens', 'irremediable consequences', 'loss of time', 'delay damages relationship', 'late return', 'measures must work in practice', 'effort is not enough', 'result-oriented assessment', 'relationship destroyed by time', 'parental responsibility lost', 'years lost', 'result not just process']
        },
        no: {
          rettssats: 'Selv når myndighetene forsøker å løse konflikter, kan tiltak som kommer for sent innebære brudd på artikkel 8 dersom relasjonen mellom barn og forelder brytes ned i mellomtiden.',
          facts: 'Polske myndigheter iverksatte ulike tiltak for å sikre samvær mellom far og barn, men tiltakene kom for sent og var utilstrekkelige. Forholdet ble nedbrutt mens prosessen pågikk.',
          quotes: [
            { para: '§§ 66-68', text: 'Det avgjørende er ikke om myndighetene har handlet, men om tiltakene faktisk har virket. Tiltak som kommer for sent oppfyller ikke statens forpliktelser.' }
          ]
        },
        en: {
          rettssats: 'Even when authorities try to resolve conflicts, measures that come too late may breach Article 8 if the parent-child relationship breaks down in the meantime.',
          facts: 'Polish authorities took various measures to secure contact between father and child, but the measures came too late and were insufficient. The relationship broke down while the process was ongoing.',
          quotes: [
            { para: '§ 115', text: 'In relation to the State\'s obligation to take positive measures, Article 8 encompasses a parent\'s right to the taking of measures with a view to his or her being reunited with the child and an obligation on the national authorities to facilitate such reunion, in so far as the interest of the child dictates that everything must be done to preserve personal relations and, if and when appropriate, to \"rebuild\" the family; the State\'s obligation is not one of result, but one of means.' },
            { para: '§ 116', text: 'Moreover, in proceedings concerning children it is important to take into consideration that time takes on a particular significance, as there is always a risk that any procedural delay will result in the de facto determination of the issue before the court. The obligation of expeditious examination of a childcare case and the obligation to assess the merits of the case on the basis of quality and sufficient evidence are equally important components of the notion of diligence which the domestic courts should manifest in order to comply with Article 8 of the Convention.' },
            { para: '§ 117', text: 'The child\'s best interests must be the primary consideration and may, depending on their nature and seriousness, override those of the parents. In this context, the Court considers that, in principle, it is in the child\'s best interests to maintain contact with both parents, in so far as practicable, on an equal footing, save for lawful limitations justified by considerations relating to those interests.' },
            { para: '§ 124', text: 'Overall, the Court considers that the protraction, caused by the domestic authorities, of the first-instance custody and return proceedings was incompatible with the requirements of diligence and expeditiousness under Article 8 of the Convention.' },
            { para: '§ 133', text: 'The Court would stress that the authorities\' effective inaction contributed to the de facto determination of the issue.' },
            { para: '§ 142', text: 'In sum, the Court acknowledges that difficulties in protecting the applicant\'s family rights derived in great part from the actions of the child\'s father. However, the authorities\' failure to act expeditiously and effectively to enforce the relevant court orders, especially during the critical early period after the father\'s refusal to return the child, contributed substantially to the breakdown of the applicant\'s relationship with her son.' },
            { para: '§§ 147–148', text: 'Having regard to the facts of the case, in particular the passage of time and the impossibility of restoring the applicant\'s family ties with her son under the present circumstances, the Court finds that the Polish authorities failed to take, in good time, the measures that could reasonably have been expected of them. There has accordingly been a violation of Article 8 of the Convention.' }
          ]
        }
      },

        appNo: '27148/12', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-153315', principles: ['time', 'cooperation'],
        tags: {
          no: ['14 år', 'fjorten år', 'langvarig prosess', 'kroatiske myndigheter', 'sak mot Kroatia', 'far så sønnen 3 ganger', 'tre samvær', 'tre møter på 14 år', 'permanent brutt bånd', 'tidsfaktor', 'uopprettelige følger', 'irreversible konsekvenser', 'klassisk eksempel', 'innsatsplikt', 'ikke resultatplikt', 'svikt over tid', 'far nektet samvær', 'langvarig manglende håndhevelse', 'foreldretvist', 'samværsnektelse over år', 'tap av tid', 'eksempel på systemets svikt', 'mest siterte sak', 'klassisk Strasbourg-dom', 'samværssvikt over år', 'foreldrebånd ødelagt', 'familieliv beskyttes', 'effektivitetsstandard', 'tiltak må iverksettes raskt', 'swiftness of implementation', 'tidskritisk', 'lang berammelse', 'søknad etter søknad', 'mange begjæringer', 'erstatning for tap', 'oppreisning', 'far og sønn separert', 'far diskriminert', 'samværsrett verdiløs i praksis', 'rett uten håndhevelse', 'teoretisk rett', 'illusorisk samvær', 'mistet barndom', 'manglende statlig respons', 'svikt over tiår', 'innsats var utilstrekkelig', 'states obligation of means', 'innsats måles på resultat'],
          en: ['14 years', 'fourteen years', 'prolonged process', 'Croatian authorities', 'case against Croatia', 'father saw son 3 times', 'three contacts', 'three meetings in 14 years', 'permanently broken bond', 'time factor', 'irremediable consequences', 'irreversible consequences', 'classic example', 'obligation of means', 'not obligation of result', 'long-term failure', 'father denied contact', 'prolonged failure to enforce', 'parental dispute', 'years of denied contact', 'loss of time', 'example of system failure', 'most cited case', 'classic Strasbourg ruling', 'contact failure over years', 'parent-child bond destroyed', 'family life protection', 'effectiveness standard', 'measures must be taken quickly', 'swiftness of implementation', 'time-critical', 'long scheduling', 'application after application', 'many petitions', 'compensation for loss', 'father and son separated', 'father discriminated', 'contact right worthless in practice', 'right without enforcement', 'theoretical right', 'illusory contact', 'lost childhood', 'lack of state response', 'failure over decades', 'effort was insufficient', 'effort measured by result', 'fundamental ruling on time', 'flagship time case']
        },
        no: {
          rettssats: 'Langvarig manglende håndheving av samværsavgjørelser kan føre til at relasjonen mellom barn og forelder brytes permanent. Staten kan da bli ansvarlig for brudd på artikkel 8.',
          facts: 'I løpet av fjorten års rettsprosess fikk far se sønnen sin tre ganger. Kroatiske domstoler avsa flere avgjørelser om samvær, men ingen ble effektivt gjennomført. EMD fant brudd på artikkel 8.',
          quotes: [
            { para: '§ 92', text: '«Tilstrekkeligheten av et tiltak skal bedømmes etter hvor raskt det iverksettes, fordi tidens gang kan ha uopprettelige følger for forholdet mellom et barn og den forelderen som ikke bor sammen med det.»' },
            { para: '§ 94', text: 'Plikten er en innsatsplikt, ikke en resultatplikt — men den innsatsen må være effektiv.' }
          ]
        },
        en: {
          rettssats: 'Prolonged failure to enforce contact orders can permanently break the relationship between parent and child. The state may then be liable for breach of Article 8.',
          facts: 'In the course of fourteen years of proceedings, the father saw his son three times. Croatian courts issued multiple contact decisions, but none were effectively enforced. The Court found a violation of Article 8.',
          quotes: [
            { para: '§ 92', text: 'Given that an effective respect for family life requires that future relations between parent and child be determined solely in the light of all the relevant considerations and not by the mere passage of time, the ineffective, and in particular delayed, conduct of custody and contact proceedings may give rise to a breach of positive obligations under Article 8 of the Convention as procedural delay may lead to a de facto determination of the matter at issue. In cases concerning a person\'s relationship with his or her child there is a duty to exercise exceptional diligence in view of the risk that the passage of time may result in a de facto determination of the matter.' },
            { para: '§ 93', text: 'In cases concerning the enforcement of decisions in the sphere of family law, the Court has repeatedly held that what is decisive in any assessment of the national authorities\' conduct is whether they have taken all necessary steps to facilitate the execution that can reasonably be demanded in the specific circumstances of each case. The adequacy of a measure is to be judged by the swiftness of its implementation, as the passage of time can have irremediable consequences for relations between a child and the parent who does not live with him.' },
            { para: '§ 94', text: 'The obligation of the national authorities to take measures to facilitate contact by a non-custodial parent with children after divorce is not, however, absolute. It is an obligation of means, and not one of result. However, lack of cooperation between separated parents is not a circumstance which can by itself exempt the authorities from their positive obligations under Article 8.' },
            { para: '§ 95', text: 'Any obligation to apply coercion in this area must be limited, since the interests, as well as the rights and freedoms, of all concerned must be taken into account, and more particularly the best interests of the child. Although coercive measures against children are not desirable in this sensitive area, the use of sanctions must not be ruled out in the event of unlawful behavior by the parent with whom the children live.' },
            { para: '§ 99', text: 'The Court is particularly struck by the fact that before 20 March 2003 the local social welfare centre did not find it necessary to provisionally regulate the issue of the applicant\'s contact with his son even though by that time the civil proceedings in which that issue was to be resolved had already been pending for almost seven years. The likelihood of family reunification will be progressively diminished and eventually destroyed if the biological father and the child are not allowed to see each other at all, or only so rarely that no natural bonding between them is likely to occur.' },
            { para: '§ 100', text: 'In the present case the domestic authorities have not taken such necessary steps to facilitate reunion between the applicant and his son that could have reasonably been expected of them. This resulted in a de facto determination of the matter at issue as the applicant had seen his son only three times before he turned eighteen.' }
          ]
        }
      },
      {
        id: 'onodi', name: 'Ónodi', country: 'Ungarn', countryEn: 'Hungary', year: 2017, date: { no: '30. mai 2017', en: '30 May 2017' },
        appNo: '38647/09', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-173800', principles: ['active', 'time', 'arsenal'],
        tags: {
          no: ['60 begjæringer', 'seksti håndhevelsesbegjæringer', '60+', 'seksti petisjoner', 'rettslig arsenal', 'legal arsenal', 'tilstrekkelig og virksomt rettslig arsenal', 'adequate legal arsenal', 'kontraherende stat', 'sak mot Ungarn', 'ungarske myndigheter', 'tidsfaktor', 'irreversible konsekvenser', 'uopprettelige følger', 'statens plikt', 'ineffektive tiltak', 'gjentatte begjæringer', 'manglende resultat', 'forelder gir ikke opp', 'systematisk svikt', 'tomme sanksjoner', 'sanksjoner uten effekt', 'manglende effekt', 'foreldretvist', 'samværsnektelse', 'samværsobstruksjon', 'forelder hindrer kontakt', 'manglende statlig respons', 'positive forpliktelser', 'foundational ruling on arsenal', 'klassisk arsenal-dom', 'staten må eskalere', 'eskalering nødvendig', 'manglende virkemidler', 'utilstrekkelig statsapparat', 'staten må ha verktøy', 'staten må være utstyrt', 'doktrinen utvides', 'effektivitet vs innsats', 'forelder leverer 60 begjæringer', 'gjentatt søknad uten resultat', 'tomgang i håndhevelse', 'systemfeil', 'manglende koordinering mellom myndigheter'],
          en: ['60 petitions', 'sixty enforcement requests', '60+ petitions', 'sixty enforcement applications', 'legal arsenal', 'adequate and sufficient legal arsenal', 'Contracting State', 'each Contracting State must equip itself', 'case against Hungary', 'Hungarian authorities', 'time factor', 'irreversible consequences', 'irremediable consequences', 'state duty', 'ineffective measures', 'repeated petitions', 'no result', 'father persists', 'parent does not give up', 'systematic failure', 'positive obligations doctrine', 'empty sanctions', 'sanctions without effect', 'lack of effect', 'parental dispute', 'contact denial', 'contact obstruction', 'parent obstructs contact', 'lack of state response', 'foundational arsenal ruling', 'classic legal arsenal case', 'state must escalate', 'escalation required', 'lack of tools', 'inadequate state apparatus', 'state must have tools', 'state must be equipped', 'doctrine extended', 'effectiveness vs effort', 'parent files 60 petitions', 'repeated applications without result', 'enforcement stagnation', 'systemic failure', 'lack of coordination between authorities']
        },
        no: {
          rettssats: 'Kontakt mellom forelder og barn er et grunnleggende element i familielivet. Myndighetenes tiltak må vurderes etter hvor raskt de settes i verk, fordi tid kan ha irreversible konsekvenser for relasjonen.',
          facts: 'En far leverte over seksti begjæringer om håndhevelse av samvær. Ingen av dem ledet til effektivt samvær. Ungarske myndigheter ble holdt ansvarlige for å ha sviktet sin positive plikt etter artikkel 8.',
          quotes: [
            { para: '§§ 30-31', text: '«Hver kontraherende stat må utstyre seg med et tilstrekkelig og virksomt rettslig arsenal for å sikre etterlevelse av sine positive forpliktelser etter artikkel 8.»' },
            { para: '§ 35', text: 'Tiltak må bedømmes etter hvor raskt de iverksettes — tid har irreversible konsekvenser.' }
          ]
        },
        en: {
          rettssats: 'Contact between parent and child is a fundamental element of family life. Measures must be assessed by how quickly they are implemented, because time can have irreversible consequences for the relationship.',
          facts: 'A father filed over sixty enforcement petitions. None of them led to effective contact. Hungarian authorities were held liable for failing their positive duty under Article 8.',
          quotes: [
            { para: '§ 30', text: 'The essential object of Article 8 is to protect the individual against arbitrary action by public authorities. There are, in addition, positive obligations inherent in an effective \"respect\" for family life. The Court has already repeatedly held that in matters relating to their custody the interest of children are of paramount importance. The child\'s best interests must be the primary consideration and may, depending on their nature and seriousness, override those of the parents.' },
            { para: '§ 32', text: 'Any obligation to apply coercion in this area must be limited since the interests as well as the rights and freedoms of all concerned must be taken into account, and more particularly the best interests of the child and his or her rights under Article 8 of the Convention. What is decisive is whether the national authorities have taken all necessary steps to facilitate the execution that can reasonably be demanded in the specific circumstances of each case. In this context, the adequacy of a measure is to be judged by the swiftness of its implementation, as the passage of time can have irremediable consequences for relations between the child and the parent who does not live with the child.' },
            { para: '§ 38', text: 'The Court finds it significant that the applicant lodged more than sixty requests for enforcement of the contact order, as it demonstrates that he had a serious interest in his daughter. The Court also acknowledges that the difficulties in securing the applicant\'s contact rights were essentially due to the mother\'s behaviour, but considers that the facts of the case indicated that the financial sanctions imposed on Ms N.R. were inadequate to improve the situation and overcome her lack of cooperation.' },
            { para: '§ 39', text: 'While the guardianship authorities were unable to enforce all aspects of the contact orders because of the respondent\'s lack of cooperation and subsequently the child\'s negative attitude towards her father, they made no considerable efforts to gradually re-establish the contact between them. Quite to the contrary, the Szolnok District Court\'s judgment of 10 June 2008 restricting the applicant\'s contact was based on the practical conclusion that the previous contact arrangements could not be implemented, thereby condoning the mother\'s uncooperative behaviour and disregard for the previous agreement.' },
            { para: '§ 41', text: 'Looking at the facts of the case, the Court believes that it would have been worthwhile to explore all available avenues to facilitate the maintenance of those ties, whether with the involvement of social services or otherwise.' },
            { para: '§ 42', text: 'The Court also notes that even if the domestic legal order did not allow for the imposition of effective sanctions, each Contracting State must equip itself with an adequate and sufficient legal arsenal to ensure compliance with the positive obligations imposed on it by Article 8 of the Convention.' }
          ]
        }
      },
      {
        id: 'sanchez', name: 'Sanchez Cardenas', country: 'Norge', countryEn: 'Norway', year: 2007, date: { no: '4. oktober 2007', en: '4 October 2007' },
        appNo: '12148/03', hudoc: 'https://hudoc.echr.coe.int/eng?i=001-82560', principles: ['investigate', 'effective'],
        tags: {
          no: ['Norge', 'norske myndigheter', 'lagmannsrett', 'samværsnektelse', 'mistanke om overgrep', 'ubegrunnet mistanke', 'prosessuell rettferdighet', 'begrunnelsesplikt', 'far nektet samvær', 'chilensk far', 'stigmatisering', 'manglende bevisvurdering', 'foreldretvist', 'menneskerettsdomstolen og Norge', 'sak mot Norge', 'far diskriminert', 'beskyldning uten bevis'],
          en: ['Norway', 'Norwegian authorities', 'High Court Norway', 'denial of contact', 'sexual abuse allegation', 'unsubstantiated suspicion', 'procedural fairness', 'duty to give reasons', 'father denied contact', 'Chilean father', 'stigmatisation', 'failure to examine evidence', 'custody and access proceedings', 'case against Norway', 'father discriminated', 'allegation without proof']
        },
        no: {
          rettssats: 'Når en domstol inkluderer en alvorlig anklage som grunnlag for å nekte samvær, må anklagen være underlagt en konkret bevisvurdering. Å la en mistanke om overgrep stå uten begrunnelse i selve avgjørelsen, slik at den blir værende på rullen som en stigmatiserende konstatering, utgjør et uberettiget inngrep i familielivet etter EMK artikkel 8.',
          facts: 'En chilensk far bosatt i Norge ble nektet enhver samværsrett med sønnen av lagmannsretten. Lagmannsretten begrunnet nektelsen med en «sterk mistanke» om at faren hadde forgrepet seg på gutten, men foretok ingen egen bevisvurdering av denne mistanken. Uttalelsen ble stående offentlig uten at faren fikk anledning til å imøtegå den.',
          quotes: [
            { para: '§§ 38–39', text: 'The High Court neither decided the issue nor made a proper analysis. It left the matter open in such a way that readers would inevitably get the impression that the suspicions were well-founded. The applicant was thus stigmatised without being given the opportunity to defend himself.' }
          ]
        },
        en: {
          rettssats: 'When a court grounds a denial of contact on a serious allegation, that allegation must be subjected to a concrete evidentiary assessment. Leaving a suspicion of abuse standing without reasoning in the judgment itself, allowing it to remain on the record as a stigmatising finding, constitutes an unjustified interference with family life under ECHR Article 8.',
          facts: 'A Chilean father resident in Norway was denied all contact with his son by the High Court. The High Court grounded the denial on a "strong suspicion" that the father had sexually abused the boy, but undertook no independent evidentiary assessment of the suspicion. The statement remained publicly on record without the father having any opportunity to rebut it.',
          quotes: [
            { para: '§ 33', text: 'The Court does not find that the issue under Article 8 of the Convention can, as suggested by the Government, be analysed solely with reference to the outcome of the case before the High Court. Even though the impugned passage in the High Court\'s judgment of 27 September 2002 had no bearing on its conclusion with regard to the applicant\'s claim of access rights in respect of his sons, it nonetheless conveyed information to the effect that the High Court, having regard to the state of the evidence, held a suspicion that the applicant had sexually abused L. It not only related to the most intimate aspects of the applicant\'s private life but it also suggested that he might have engaged in highly reprehensible conduct vis-à-vis a person to whom he had family ties, his son.' },
            { para: '§ 34', text: 'The Court finds that the inclusion by the High Court of the disputed statement as a part of its own reasoning in the judgment constituted an interference with the applicant\'s right to respect for his private and family life as guaranteed by Article 8 § 1 of the Convention.' },
            { para: '§ 37', text: 'Without it serving any purpose for its resolution of the case, the High Court took judicial notice of the evidence before it and affirmed on this basis a suspicion of its own that the applicant had committed a serious crime, sexual abuse against one of his sons. No cogent reasons have come to light as to why the High Court in part dealt with, in part omitted to deal with the issue of sexual abuse. In the Court\'s opinion, the national court should either have disposed of the issue, with all that means in terms of evidentiary assessment and reasoning, or have left it on the side.' },
            { para: '§ 38', text: 'The above portrayal of the applicant\'s conduct in an authoritative judicial ruling was likely to carry great significance by the way it stigmatised him and was capable of having a major impact on his personal situation as well as his honour and reputation. Despite its character and potentially damaging effects on his enjoyment of private and family life, the inclusion of the said passage in the High Court\'s judgment was not supported by any cogent reasons.' },

    // Build a Text Fragment URL to the pasg.no article that highlights

    function deburr(s) {
      return String(s).normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();

    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function highlight(text, query) {
      if (!query) return text;
      const tokens = deburr(query).split(/\s+/).filter(t => t.length > 1);
      if (tokens.length === 0) return text;
      let out = text;
      tokens.forEach(t => {
        const re = new RegExp('(' + escapeRegExp(t) + ')', 'gi');
        out = out.replace(re, '<mark>$1</mark>');

      return out;

    function scoreCase(c, q) {
      // Returns 0 if no match, higher = better match.
      const tokens = q.split(/\s+/).filter(t => t.length > 0);
      if (tokens.length === 0) return 0;
      const lang = currentLang;
      const fields = {
        name: deburr(getName(c)),
        country: deburr(getCountry(c)),
        appNo: deburr(c.appNo),
        keywords: deburr((c.tags && c.tags[lang] ? c.tags[lang].join(' | ') : '')),

        // Domain synonyms — common terms shared across all cases. Lower weight
        // so case-specific tags rank higher when both match.
        common: deburr((commonSynonyms[lang] || []).join(' | '))
      };
      const weights = {
        name: 18, keywords: 12, country: 8, appNo: 5,
        rettssats: 6, facts: 3, quotes: 4, common: 4
      };
      let score = 0;
      tokens.forEach(t => {
        Object.keys(fields).forEach(k => {
          if (fields[k].includes(t)) score += weights[k];
        });
      });
      return score;
    }

    function matchesSearch(c) {
      if (!searchTerm) return true;

      kws.forEach(kw => {

      return matched;
