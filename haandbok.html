<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Håndbok · Statens positive forpliktelser etter EMK artikkel 8</title>
  <meta name="description" content="Søkbar håndbok over Den europeiske menneskerettsdomstolens praksis om statens positive forpliktelser etter artikkel 8 i familiesaker." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white: #ffffff;
      --off-white: #f6fbfd;
      --tint: #eaf6fd;
      --ink: #0a1929;
      --body: #1a2942;
      --muted: #5c6f8a;
      --muted-soft: #93a3b8;
      --rule: #dde7ef;
      --rule-soft: #ebf1f6;
      --brand: #4db2ec;
      --brand-deep: #1a7fb8;
      --brand-darker: #0c5780;
      --brand-soft: rgba(77, 178, 236, 0.10);
      --brand-softer: rgba(77, 178, 236, 0.04);
      --accent: #e11d48;
      --accent-soft: rgba(225, 29, 72, 0.08);
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --max: 1200px;
      --max-narrow: 760px;
      --pad: clamp(20px, 4vw, 48px);
      --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--body);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      font-feature-settings: "ss01", "cv11";
    }

    ::selection { background: var(--brand); color: var(--ink); }
    a { color: inherit; }

    /* ICONS */
    .icon {
      width: 1em; height: 1em;
      vertical-align: -0.15em;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .icon-xs { width: 12px; height: 12px; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 20px; height: 20px; }
    .icon-lg { width: 28px; height: 28px; }

    /* ECHR BANNER */
    .echr-banner {
      background: var(--ink);
      color: var(--white);
      padding: 28px var(--pad);
      position: relative;
      overflow: hidden;
    }

    .echr-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 88% 50%, rgba(77, 178, 236, 0.18) 0%, transparent 55%);
      pointer-events: none;
    }

    .echr-banner-inner {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 28px;
      position: relative;
    }

    .echr-banner-img {
      /* CSS mask: image alpha determines what's painted, background-color is the fill */
      width: 240px;
      height: 88px;
      flex: 0 0 auto;
      background-color: rgba(255, 255, 255, 0.92);
      -webkit-mask: url('echr-building.png') no-repeat center / contain;
      mask: url('echr-building.png') no-repeat center / contain;
    }

    .echr-banner-text {
      font-size: clamp(15px, 1.8vw, 22px);
      font-weight: 600;
      letter-spacing: -0.005em;
      line-height: 1.3;
      color: var(--white);
      max-width: 36em;
    }

    .echr-banner-text strong {
      color: var(--brand);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .echr-banner-inner { gap: 18px; }
      .echr-banner-img { height: 52px; }
      .echr-banner-text { font-size: 14px; }
    }

    /* HEADER */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: saturate(160%) blur(14px);
      -webkit-backdrop-filter: saturate(160%) blur(14px);
      border-bottom: 1px solid var(--rule);
      padding: 12px var(--pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--ink);
      min-width: 0;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
      flex: 0 0 auto;
    }

    .brand-divider { width: 1px; height: 18px; background: var(--rule); }

    .brand-tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      white-space: nowrap;
    }

    .brand-tagline::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      margin-right: 8px;
      transform: translateY(-1px);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }

    .mode-switch a {
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s var(--ease);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .mode-switch a:hover { color: var(--ink); }
    .mode-switch a.active {
      background: var(--ink);
      color: var(--white);
    }
    .mode-switch a .icon { width: 13px; height: 13px; }

    .lang-toggle {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 999px;
      overflow: hidden;
      background: var(--white);
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      padding: 6px 13px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: all 0.2s var(--ease);
    }
    .lang-toggle button:hover { color: var(--ink); }
    .lang-toggle button.active { background: var(--ink); color: var(--white); }

    @media (max-width: 720px) {
      .brand-divider, .brand-tagline { display: none; }
      .mode-switch a { padding: 7px 10px; }
    }

    /* SEARCH HERO */
    .search-hero {
      position: relative;
      padding: clamp(50px, 9vh, 90px) var(--pad) clamp(36px, 5vh, 60px);
      max-width: 1320px;
      margin: 0 auto;
      overflow: hidden;
    }
    .search-hero-inner { position: relative; max-width: 920px; margin: 0 auto; text-align: center; }
    .search-hero h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(28px, 4.2vw, 46px);
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 18px;
      max-width: 22ch;
      margin-left: auto;
      margin-right: auto;
    }
    .search-hero h1 .accent {
      color: var(--brand-deep);
      position: relative;
      display: inline-block;
    }
    .search-hero h1 .accent::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0.05em;
      height: 0.18em;
      background: var(--brand);
      opacity: 0.32;
      z-index: -1;
    }
    .search-hero .hero-lede {
      font-size: clamp(15px, 1.5vw, 17px);
      line-height: 1.55;
      color: var(--muted);
      max-width: 48em;
      margin: 0 auto 32px;
    }
    .search-hero .eyebrow {
      margin: 0 auto 22px;
      display: inline-flex;
    }

    .big-search-wrap {
      position: relative;
      max-width: 640px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
    }
    .big-search-icon {
      position: absolute;
      left: 22px;
      width: 22px;
      height: 22px;
      color: var(--brand-deep);
      pointer-events: none;
    }
    .big-search {
      flex: 1;
      padding: 18px 64px 18px 58px;
      border: 1.5px solid var(--rule);
      border-radius: 12px;
      font-family: inherit;
      font-size: 17px;
      color: var(--ink);
      background: var(--white);
      box-shadow: 0 4px 20px -6px rgba(10, 25, 41, 0.06);
      transition: all 0.2s var(--ease);
      width: 100%;
      letter-spacing: -0.005em;
    }
    .big-search:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 6px 26px -6px rgba(26, 127, 184, 0.25), 0 0 0 4px var(--brand-soft);
    }
    .big-search::placeholder { color: var(--muted-soft); }
    .big-search-kbd {
      position: absolute;
      right: 18px;
      padding: 3px 9px;
      background: var(--rule-soft);
      border: 1px solid var(--rule);
      border-radius: 5px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      pointer-events: none;
    }

    .search-suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: baseline;
      gap: 4px 18px;
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .search-suggestions .ss-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-right: 6px;
    }
    .ss-chip {
      padding: 4px 0;
      background: none;
      border: none;
      border-bottom: 1px dashed var(--rule);
      font-family: inherit;
      font-size: 13.5px;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s var(--ease);
      letter-spacing: -0.005em;
      font-weight: 500;
      font-style: italic;
    }
    .ss-chip:hover {
      color: var(--brand-deep);
      border-bottom-color: var(--brand);
      border-bottom-style: solid;
    }
    .ss-chip::before {
      content: '↗';
      margin-right: 5px;
      font-size: 11px;
      vertical-align: 1px;
      color: var(--brand);
      font-style: normal;
    }

    .search-hero .db-filters {
      justify-content: center;
      margin-top: 8px;
    }

    /* RESULTS SECTION */
    .results-section {
      padding: clamp(20px, 4vh, 40px) var(--pad) clamp(60px, 10vh, 100px);
    }
    .results-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .case-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 760px) {
      .case-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
    }

    /* legacy hero kept for compatibility but unused */
    .hero { display: none; }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--rule-soft) 1px, transparent 1px),
        linear-gradient(to bottom, var(--rule-soft) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at 75% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 75% 30%, black 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.6;
    }

    .hero-inner { position: relative; max-width: 980px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .eyebrow .icon { width: 14px; height: 14px; color: var(--brand); }

    .hero h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(34px, 5.6vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 28px;
      max-width: 18ch;
    }

    .hero h1 .accent {
      color: var(--brand-deep);
      position: relative;
      display: inline-block;
    }
    .hero h1 .accent::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0.05em;
      height: 0.18em;
      background: var(--brand);
      opacity: 0.32;
      z-index: -1;
    }

    .hero-lede {
      font-size: clamp(17px, 1.85vw, 21px);
      line-height: 1.55;
      color: var(--body);
      max-width: 42em;
      margin: 0 0 36px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 32px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      max-width: 720px;
    }

    .hero-meta-item {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-meta-item strong {
      color: var(--ink);
      font-weight: 700;
      font-size: 13px;
    }
    .hero-meta-item .dot {
      width: 5px; height: 5px;
      background: var(--brand);
      border-radius: 50%;
    }

    /* CHAPTERS */
    .chapter {
      padding: clamp(70px, 10vh, 110px) var(--pad);
    }

    .chapter > .inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .chapter.bg-alt { background: var(--off-white); }

    .chapter-head {
      max-width: var(--max-narrow);
      margin-bottom: 44px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .section-tag .icon { width: 14px; height: 14px; color: var(--brand); }

    .chapter h2 {
      font-size: clamp(26px, 3.6vw, 40px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0 0 24px;
    }

    .chapter .intro {
      font-size: clamp(16px, 1.55vw, 19px);
      line-height: 1.6;
      color: var(--body);
      margin: 0;
    }

    /* DOCTRINE BOX */
    .doctrine-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 16px;
    }
    @media (min-width: 880px) {
      .doctrine-stack { grid-template-columns: 1fr 1fr; gap: 20px; }
    }

    .doctrine-box {
      padding: 38px 36px;
      background: var(--ink);
      color: var(--white);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      margin-top: 16px;
    }

    .doctrine-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 92% 10%, rgba(77, 178, 236, 0.22) 0%, transparent 55%);
      pointer-events: none;
    }

    .doctrine-box .db-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 18px;
      position: relative;
    }

    .doctrine-box h3 {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.015em;
      color: var(--white);
      margin: 0 0 16px;
      position: relative;
    }

    .doctrine-box p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 0 14px;
      max-width: 48em;
      position: relative;
    }

    .doctrine-box p:last-child { margin-bottom: 0; }

    .doctrine-box .db-cite {
      margin-top: 22px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.6);
      position: relative;
    }

    .doctrine-box-secondary {
      background: var(--white);
      color: var(--ink);
      border: 1px solid var(--rule);
    }
    .doctrine-box-secondary::before {
      background: radial-gradient(circle at 92% 10%, rgba(77, 178, 236, 0.18) 0%, transparent 55%);
    }
    .doctrine-box-secondary .db-label { color: var(--brand-deep); }
    .doctrine-box-secondary h3 { color: var(--ink); }
    .doctrine-box-secondary p { color: var(--body); }
    .doctrine-box-secondary .db-cite { color: var(--muted); }

    /* OBLIGATION CARDS */
    .obligations {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    @media (min-width: 720px) {
      .obligations { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1080px) {
      .obligations { grid-template-columns: repeat(3, 1fr); }
    }

    .obligation {
      padding: 26px 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      transition: all 0.2s var(--ease);
    }
    .chapter.bg-alt .obligation { background: var(--white); }

    .obligation:hover {
      transform: translateY(-3px);
      border-color: var(--brand);
      box-shadow: 0 10px 28px -12px rgba(26, 127, 184, 0.2);
    }

    .obligation {
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: inherit;
      width: 100%;
    }

    .obligation:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 3px;
    }

    .obligation .ob-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .obligation .ob-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--brand-deep);
    }

    .obligation .ob-count {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
    }

    .obligation .ob-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      margin-bottom: 16px;
    }
    .obligation .ob-icon .icon { width: 22px; height: 22px; stroke-width: 1.9; }

    .obligation h3 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 10px;
    }

    .obligation p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 14px;
    }

    .obligation .ob-cases {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--rule-soft);
    }

    .obligation .ob-case {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s var(--ease);
      font-family: inherit;
    }
    .obligation .ob-case:hover {
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-color: var(--brand);
    }

    /* CASE DATABASE */
    .db-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      align-items: center;
    }
    .chapter.bg-alt .db-controls { background: var(--white); }

    .db-search-wrap {
      flex: 1 1 280px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .db-search-wrap .icon-prefix {
      position: absolute;
      left: 12px;
      color: var(--muted-soft);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .db-search {
      flex: 1;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--rule);
      border-radius: 7px;
      font-family: inherit;
      font-size: 14px;
      background: var(--white);
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .db-search:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .db-search::placeholder { color: var(--muted-soft); }

    .db-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .db-filter {
      padding: 6px 12px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-family: inherit;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s var(--ease);
    }
    .db-filter:hover { color: var(--ink); border-color: var(--brand); }
    .db-filter.active {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
    }

    .db-stats {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .db-stats strong { color: var(--ink); }

    .case-row {
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .case-row:hover {
      border-color: var(--brand);
      transform: translateY(-2px);
      box-shadow: 0 14px 36px -14px rgba(26, 127, 184, 0.2);
    }

    .case-row.open {
      border-color: var(--brand);
      box-shadow: 0 14px 36px -14px rgba(26, 127, 184, 0.3);
      grid-column: 1 / -1;
    }

    .case-row.hidden { display: none; }

    .case-row-preview {
      padding: 18px 22px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--body);
      border-top: 1px solid var(--rule-soft);
    }
    .case-row-preview-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .case-row.open .case-row-preview { display: none; }

    .case-keywords {
      padding: 0 22px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .case-row.open .case-keywords { display: none; }
    .keyword-chip {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    .keyword-chip.match {
      background: var(--brand-soft);
      color: var(--brand-deep);
      font-weight: 600;
    }

    .case-row-summary {
      padding: 20px 24px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 18px;
      align-items: center;
      border: none;
      background: transparent;
      text-align: left;
      font-family: inherit;
      color: inherit;
      width: 100%;
    }

    .case-row-year {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand-deep);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .case-row-flag {
      font-size: 18px;
      margin-right: 8px;
      vertical-align: -1px;
      line-height: 1;
      display: inline-block;
    }

    .case-row-body {
      min-width: 0;
    }

    .case-row-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .case-row-name em { font-style: italic; font-feature-settings: "ss01"; }

    .case-row-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.02em;
      align-items: center;
    }

    .case-row-meta .country-chip {
      display: inline-block;
      padding: 3px 9px;
      background: var(--rule-soft);
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .case-row-meta .country-chip.norway {
      background: rgba(225, 29, 72, 0.12);
      color: var(--accent);
    }
    .case-row-meta .meta-app {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 11px;
      color: var(--muted-soft);
      letter-spacing: 0;
    }
    .case-row-meta .meta-divider {
      color: var(--muted-soft);
      opacity: 0.5;
    }

    .case-row-chev {
      color: var(--muted-soft);
      transition: transform 0.2s var(--ease);
    }
    .case-row.open .case-row-chev { transform: rotate(90deg); color: var(--brand); }
    .case-row-chev .icon { width: 16px; height: 16px; }

    .case-detail {
      display: none;
      padding: 4px 22px 22px 22px;
      border-top: 1px solid var(--rule);
      background: var(--off-white);
    }
    .case-row.open .case-detail { display: block; }

    .case-detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding-top: 22px;
    }

    @media (min-width: 760px) {
      .case-detail-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    }

    .cd-block .cd-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cd-block .cd-label .dot {
      width: 8px; height: 8px;
      background: var(--brand);
      border-radius: 50%;
    }

    .cd-block .cd-text {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--body);
    }

    .case-quotes {
      grid-column: 1 / -1;
      margin-top: 12px;
    }

    .case-quote-block {
      padding: 18px 22px;
      border: 2px solid var(--accent);
      background: var(--white);
      border-radius: 6px;
      margin-bottom: 12px;
      position: relative;
    }

    .case-quote-block::before {
      content: 'VERBATIM';
      position: absolute;
      top: -9px;
      left: 16px;
      background: var(--accent);
      color: var(--white);
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.18em;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .case-quote-block .qb-para {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 10px;
      margin-top: 2px;
    }

    .case-quote-block .qb-text {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink);
      font-style: italic;
    }

    .case-quote-block .qb-lang {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed var(--rule);
    }

    .case-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .case-tag {
      display: inline-block;
      padding: 4px 11px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      transition: all 0.15s var(--ease);
    }
    .case-tag:hover {
      background: var(--brand);
      color: var(--white);
      border-color: var(--brand);
    }

    /* CASE READER MODAL (full case in a sheet) */
    .cr-modal {
      position: fixed;
      inset: 0;
      z-index: 320;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .cr-modal[hidden] { display: none; }

    .cr-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 25, 41, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: backdropIn 0.2s ease;
    }

    .cr-sheet {
      position: relative;
      background: var(--white);
      width: min(880px, 100%);
      margin-left: auto;
      box-shadow: -20px 0 60px -10px rgba(10, 25, 41, 0.35);
      overflow-y: auto;
      animation: sheetSlideIn 0.32s var(--ease);
      display: flex;
      flex-direction: column;
    }

    @keyframes sheetSlideIn {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .cr-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      padding: 16px 28px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .cr-head-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-deep);
    }

    .cr-close {
      background: var(--rule-soft);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .cr-close:hover { background: var(--rule); color: var(--ink); }
    .cr-close .icon { width: 16px; height: 16px; }

    .cr-body {
      padding: 36px 40px 48px;
    }

    .cr-case-head {
      padding-bottom: 22px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--rule);
    }

    .cr-case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 12px;
      align-items: center;
    }
    .cr-case-meta .cr-year {
      font-size: 28px;
      font-weight: 800;
      color: var(--brand-deep);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-right: 4px;
    }
    .cr-case-meta .cr-flag { font-size: 22px; }
    .cr-case-meta .cr-app {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted-soft);
    }

    .cr-case-name {
      font-size: clamp(24px, 3.4vw, 34px);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--ink);
      line-height: 1.15;
      margin: 0 0 4px;
    }
    .cr-case-name em { font-style: italic; font-feature-settings: "ss01"; }

    .cr-section {
      margin-top: 26px;
    }
    .cr-section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cr-section-label .icon { width: 14px; height: 14px; color: var(--brand); }

    .cr-text {
      font-size: 16px;
      line-height: 1.65;
      color: var(--body);
    }

    .cr-quote {
      padding: 22px 26px;
      border: 2px solid var(--accent);
      background: rgba(225, 29, 72, 0.04);
      border-radius: 8px;
      position: relative;
      margin-bottom: 14px;
    }
    .cr-quote::before {
      content: 'VERBATIM';
      position: absolute;
      top: -10px;
      left: 18px;
      background: var(--accent);
      color: var(--white);
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.18em;
      padding: 3px 9px;
      border-radius: 3px;
    }
    .cr-quote-para {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin: 2px 0 12px;
    }
    .cr-quote-text {
      font-size: 16px;
      line-height: 1.6;
      color: var(--ink);
      font-style: italic;
    }
    .cr-quote-lang {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--rule);
    }

    .cr-principles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .cr-principle-tag {
      display: inline-block;
      padding: 6px 12px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      transition: all 0.15s var(--ease);
    }
    .cr-principle-tag:hover {
      background: var(--brand);
      color: var(--white);
    }

    .cr-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
      padding-top: 22px;
      border-top: 1px solid var(--rule);
    }

    .cr-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .cr-action-hudoc {
      background: var(--ink);
      color: var(--white);
    }
    .cr-action-hudoc:hover { background: var(--brand-deep); transform: translateY(-1px); }
    .cr-action-hudoc .icon { width: 13px; height: 13px; color: var(--brand); stroke-width: 2.2; }
    .cr-action-copy {
      background: var(--white);
      color: var(--brand-deep);
      border-color: var(--rule);
    }
    .cr-action-copy:hover { border-color: var(--brand); background: var(--brand-soft); }
    .cr-action-copy.done { background: var(--brand); color: var(--white); border-color: var(--brand); }
    .cr-action-copy .icon { width: 13px; height: 13px; stroke-width: 2.2; }

    @media (max-width: 720px) {
      .cr-sheet { width: 100%; }
      .cr-body { padding: 24px 22px 36px; }
    }

    /* OBLIGATION MODAL */
    .ob-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 20px;
    }
    .ob-modal[hidden] { display: none; }

    .ob-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 25, 41, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: backdropIn 0.2s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .ob-modal-card {
      position: relative;
      background: var(--white);
      border-radius: 14px;
      width: 100%;
      max-width: 640px;
      max-height: calc(100vh - 80px);
      overflow: auto;
      box-shadow: 0 30px 60px -15px rgba(10, 25, 41, 0.4);
      animation: modalIn 0.28s var(--ease);
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(-14px) scale(0.97); } to { opacity: 1; transform: none; } }

    .ob-modal-head {
      padding: 26px 28px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .ob-modal-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--brand);
      color: var(--white);
      flex: 0 0 auto;
    }
    .ob-modal-icon .icon { width: 22px; height: 22px; }

    .ob-modal-close {
      background: var(--rule-soft);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .ob-modal-close:hover { background: var(--rule); color: var(--ink); }
    .ob-modal-close .icon { width: 14px; height: 14px; }

    .ob-modal-body {
      padding: 14px 28px 28px;
    }

    .ob-modal-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 8px;
      margin-top: 14px;
    }

    .ob-modal-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--ink);
      margin: 0 0 12px;
      line-height: 1.25;
    }

    .ob-modal-body-text {
      font-size: 15px;
      line-height: 1.55;
      color: var(--body);
      margin-bottom: 22px;
    }

    .ob-modal-actionables {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: act;
    }
    .ob-modal-actionables li {
      counter-increment: act;
      padding: 14px 0 14px 38px;
      position: relative;
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink);
      border-top: 1px solid var(--rule-soft);
    }
    .ob-modal-actionables li:first-child { border-top: none; }
    .ob-modal-actionables li::before {
      content: counter(act, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--brand-deep);
      letter-spacing: 0.06em;
    }

    .ob-modal-cases {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .ob-modal-cases strong { color: var(--ink); }

    .case-detail-footer {
      grid-column: 1 / -1;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }

    .case-finn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 12px;
      background: var(--ink);
      color: var(--white);
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.15s;
    }
    .case-finn:hover { background: var(--brand-deep); transform: translateY(-1px); }
    .case-finn .icon { width: 13px; height: 13px; stroke-width: 2.2; color: var(--brand); }

    .case-hudoc-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px 7px 10px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--rule);
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .case-hudoc-secondary:hover { color: var(--brand-deep); border-color: var(--brand); }
    .case-hudoc-secondary .icon { width: 12px; height: 12px; stroke-width: 2.2; }

    .case-app {
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .case-app strong { color: var(--ink); font-weight: 700; }

    .case-copy {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px 7px 11px;
      background: var(--white);
      color: var(--brand-deep);
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s var(--ease);
    }
    .case-copy:hover { border-color: var(--brand); background: var(--brand-soft); }
    .case-copy.done { background: var(--brand); color: var(--white); border-color: var(--brand); }
    .case-copy .icon { width: 12px; height: 12px; stroke-width: 2.2; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      padding: 11px 20px;
      background: var(--ink);
      color: var(--white);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      box-shadow: 0 10px 30px -10px rgba(10, 25, 41, 0.4);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast .icon { width: 14px; height: 14px; color: var(--brand); vertical-align: -3px; margin-right: 6px; }

    mark {
      background: rgba(77, 178, 236, 0.35);
      color: var(--ink);
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }

    /* HOW TO USE */
    .howto {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 16px;
    }

    @media (min-width: 760px) {
      .howto { grid-template-columns: repeat(3, 1fr); }
    }

    .howto-step {
      padding: 24px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 10px;
      position: relative;
    }
    .chapter.bg-alt .howto-step { background: var(--white); }

    .howto-step .ht-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: 0.16em;
      margin-bottom: 12px;
    }

    .howto-step h4 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    .howto-step p {
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }

    /* FOOTER */
    .site-footer {
      padding: 64px var(--pad) 36px;
      border-top: 1px solid var(--rule);
      background: var(--off-white);
    }
    .site-footer .inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .site-footer p {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;

      const grid = document.getElementById('obligations-grid');
      if (!grid) return;
      const T = content[currentLang];
      grid.innerHTML = obligations.map((o, i) => {
        const matchingCount = cases.filter(c => c.principles && c.principles.includes(o.id)).length;
        const countLabel = matchingCount === 1
          ? T.case_count_one
          : T.case_count.replace('%N%', matchingCount);
        const caseChips = o.cases.map(name => `<button class="ob-case" data-jump-name="${name}" type="button" onclick="event.stopPropagation()">${name}</button>`).join('');
        return `
          <button class="obligation" data-filter-to="${o.id}" type="button">
            <div class="ob-top">
              <div class="ob-num">P${String(i + 1).padStart(2, '0')}</div>
              <div class="ob-count">${countLabel}</div>
            </div>
            <span class="ob-icon"><svg class="icon"><use href="#${o.icon}"/></svg></span>
            <h3>${o[currentLang].title}</h3>
            <p>${o[currentLang].body}</p>
            <div class="ob-cases">${caseChips}</div>
          </button>
        `;
      }).join('');
      grid.querySelectorAll('.obligation').forEach(card => {
        card.addEventListener('click', () => {
          const target = card.dataset.filterTo;
          if (!target) return;
          activeFilter = target;
          renderFilters();
          renderCases();
          const db = document.getElementById('database');
          if (db) db.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
      grid.querySelectorAll('.ob-case').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const name = btn.dataset.jumpName;
          const c = cases.find(cc => cc.name === name || cc.nameEn === name);
          if (c) {
            const el = document.getElementById('case-' + c.id);
            if (el) {
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              setTimeout(() => el.classList.add('open'), 400);
            }
          }
        });
      });
    }

    function renderFilters() {
      const wrap = document.getElementById('db-filters');
      if (!wrap) return;
      const T = content[currentLang];
      const filters = [
        { id: 'all', label: T.db_filter_all },
        { id: 'effective', label: T.db_filter_effective },
        { id: 'time', label: T.db_filter_time },
        { id: 'active', label: T.db_filter_active },
        { id: 'investigate', label: T.db_filter_investigate },
        { id: 'cooperation', label: T.db_filter_cooperation },
        { id: 'arsenal', label: T.db_filter_arsenal }
      ];
      wrap.innerHTML = filters.map(f =>
        `<button class="db-filter ${f.id === activeFilter ? 'active' : ''}" data-filter="${f.id}">${f.label}</button>`
      ).join('');
      wrap.querySelectorAll('.db-filter').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter;
          renderFilters();
          renderCases();
        });
      });
    }

    function matchesFilter(c) {
      if (activeFilter === 'all') return true;
      return c.principles && c.principles.includes(activeFilter);
    }

    function scoreCase(c, q) {
      // Returns 0 if no match, higher = better match.
      // Weights: name 18, keyword 12, country 8, holding 6, quote 4, facts 3, app no 5
      const tokens = q.split(/\s+/).filter(t => t.length > 0);
      if (tokens.length === 0) return 0;
      const lang = currentLang;
      const fields = {
        name: deburr(getName(c)),
        country: deburr(getCountry(c)),
        appNo: deburr(c.appNo),
        keywords: deburr((c.tags && c.tags[lang] ? c.tags[lang].join(' | ') : '')),
        rettssats: deburr(c[lang].rettssats || ''),
        facts: deburr(c[lang].facts || ''),
        quotes: deburr((c[lang].quotes || []).map(q => q.text).join(' '))
      };
      const weights = { name: 18, keywords: 12, country: 8, appNo: 5, rettssats: 6, facts: 3, quotes: 4 };
      let score = 0;
      tokens.forEach(t => {
        Object.keys(fields).forEach(k => {
          if (fields[k].includes(t)) score += weights[k];
        });
      });
      return score;
    }

    function matchesSearch(c) {
      if (!searchTerm) return true;
      const q = deburr(searchTerm).trim();
      if (!q) return true;
      return scoreCase(c, q) > 0;
    }

    function getMatchedKeywords(c, q) {
      if (!q) return new Set();
      const lang = currentLang;
      const tokens = deburr(q).split(/\s+/).filter(t => t.length > 0);
      const matched = new Set();
      const kws = c.tags && c.tags[lang] ? c.tags[lang] : [];
      kws.forEach(kw => {
        const kd = deburr(kw);
        if (tokens.some(t => kd.includes(t) || t.includes(kd))) matched.add(kw);
      });
      return matched;
    }

    function renderCases() {
      const list = document.getElementById('case-list');
      let visible = cases.filter(c => matchesFilter(c) && matchesSearch(c));
      // Sort by search relevance when a search term is active
      if (searchTerm) {
        const q = deburr(searchTerm).trim();
        visible = visible.map(c => ({ c, s: scoreCase(c, q) }))
                         .sort((a, b) => b.s - a.s)
                         .map(x => x.c);
      } else {
        visible = visible.sort((a, b) => a.year - b.year);
      }
      const stats = document.getElementById('db-stats');
      const T = content[currentLang];

      if (visible.length === 0) {
        if (stats) stats.textContent = T.db_stats_none;
        list.innerHTML = `<div class="empty-state">${T.db_stats_none}</div>`;
        return;
      }
      if (stats) stats.innerHTML = T.db_stats_showing.replace('%CURRENT%', `<strong>${visible.length}</strong>`).replace('%TOTAL%', `<strong>${cases.length}</strong>`);

      const matchedSet = (c) => getMatchedKeywords(c, searchTerm);

      list.innerHTML = visible.map(c => {
        const isNorway = c.country === 'Norge' || c.country === 'Norway';
        const principleChips = c.principles.map(p => {
          const o = obligations.find(x => x.id === p);
          return o ? `<button class="case-tag" type="button" data-obligation="${p}" onclick="event.stopPropagation()">${o[currentLang].title}</button>` : '';
        }).join('');
        // Always show verbatim English quote (we can't translate judgment text)
        const enQuotes = (c.en.quotes || []);
        const quotes = enQuotes.map(q => `
          <div class="case-quote-block">
            <div class="qb-para">${q.para}</div>
            <div class="qb-text">${highlight(q.text, searchTerm)}</div>
          </div>
        `).join('');
        const facts = highlight(c[currentLang].facts || '', searchTerm);
        const rettssats = highlight(c[currentLang].rettssats || '', searchTerm);
        const nameDisplay = `<em>${highlight(getName(c), searchTerm)}</em> mot ${highlight(getCountry(c), searchTerm)}`;

        // Preview text — short rettssats
        const previewText = c[currentLang].rettssats || '';
        const previewHtml = highlight(previewText, searchTerm);

        // Keyword chips — show 6, prioritizing matched
        const allKws = (c.tags && c.tags[currentLang]) ? c.tags[currentLang] : [];
        const matched = matchedSet(c);
        const orderedKws = [...allKws].sort((a, b) => (matched.has(b) ? 1 : 0) - (matched.has(a) ? 1 : 0));
        const visibleKws = orderedKws.slice(0, 6);
        const kwChips = visibleKws.map(k => `<span class="keyword-chip ${matched.has(k) ? 'match' : ''}">${k}</span>`).join('');

        return `
          <div class="case-row" id="case-${c.id}">
            <button class="case-row-summary" type="button" aria-expanded="false">
              <span class="case-row-year">${c.year}</span>
              <div class="case-row-body">
                <div class="case-row-name"><span class="case-row-flag" aria-hidden="true">${getFlag(c)}</span>${nameDisplay}</div>
                <div class="case-row-meta">
                  <span>${c.date[currentLang]}</span>
                  <span class="meta-divider">·</span>
                  <span class="meta-app">${c.appNo}</span>
                </div>
              </div>
              <span class="case-row-chev" aria-hidden="true"><svg class="icon"><use href="#i-chevron-right"/></svg></span>
            </button>
            <div class="case-row-preview"><div class="case-row-preview-text">${previewHtml}</div></div>
            <div class="case-keywords">${kwChips}</div>
            <div class="case-detail">
              <div class="case-detail-grid">
                <div class="cd-block">
                  <div class="cd-label"><span class="dot"></span>${currentLang === 'no' ? 'Rettssats' : 'Holding'}</div>
                  <div class="cd-text">${rettssats}</div>
                </div>
                <div class="cd-block">
                  <div class="cd-label"><span class="dot"></span>${currentLang === 'no' ? 'Saken kort' : 'Facts'}</div>
                  <div class="cd-text">${facts}</div>
                </div>
                <div class="case-quotes">${quotes}</div>
                <div class="case-detail-footer">
                  <button class="case-finn" data-finn="${c.id}" type="button" onclick="event.stopPropagation()">
                    <svg class="icon"><use href="#i-book-open"/></svg>${currentLang === 'no' ? 'Finn dom' : 'Find judgment'}
                  </button>
                  <a class="case-hudoc-secondary" href="${c.hudoc}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                    <svg class="icon"><use href="#i-gavel"/></svg>HUDOC
                  </a>
                  <button class="case-copy" data-case-id="${c.id}" type="button" onclick="event.stopPropagation()">
                    <svg class="icon"><use href="#i-list"/></svg>${content[currentLang].copy_cite}
                  </button>
                  <div class="case-tags">${principleChips}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.case-row-summary').forEach(btn => {
        btn.addEventListener('click', () => {
          const row = btn.parentElement;
          const open = row.classList.toggle('open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      });

      list.querySelectorAll('.case-tag').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openObligationModal(btn.dataset.obligation);
        });
      });

      list.querySelectorAll('.case-finn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openCaseReader(btn.dataset.finn);
        });
      });

      list.querySelectorAll('.case-copy').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const cid = btn.dataset.caseId;
          const c = cases.find(cc => cc.id === cid);
          if (!c) return;
          const lang = currentLang;
          const fullName = `${getName(c)} v. ${getCountry(c)}`;
          const citation = `${fullName}, app. no. ${c.appNo}, ECHR ${c.date[lang]}. Available at ${c.hudoc}`;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(citation).then(() => {
              btn.classList.add('done');
              btn.innerHTML = `<svg class="icon"><use href="#i-list"/></svg>${content[lang].copy_done}`;
              showToast(content[lang].copy_done + ' · ' + fullName);
              setTimeout(() => {
                btn.classList.remove('done');
                btn.innerHTML = `<svg class="icon"><use href="#i-list"/></svg>${content[lang].copy_cite}`;
              }, 2200);
            }).catch(() => fallbackCopy(citation, btn));
          } else {
            fallbackCopy(citation, btn);
          }
        });
      });
    }

    function fallbackCopy(text, btn) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      showToast(content[currentLang].copy_done);
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    /* ============ CASE READER MODAL ============ */
    function openCaseReader(caseId) {
      const c = cases.find(cc => cc.id === caseId);
      if (!c) return;
      const lang = currentLang;
      const T = content[lang];

      const enQuotes = (c.en.quotes || []);
      const quotesHtml = enQuotes.map(q => `
        <div class="cr-quote">
          <div class="cr-quote-para">${q.para}</div>
          <div class="cr-quote-text">${q.text}</div>
          <div class="cr-quote-lang">${T.cr_quote_lang_note}</div>
        </div>
      `).join('');

      const principleChips = c.principles.map(p => {
        const o = obligations.find(x => x.id === p);
        return o ? `<button class="cr-principle-tag" type="button" data-obligation="${p}">${o[lang].title}</button>` : '';
      }).join('');

      const body = document.getElementById('cr-body');
      body.innerHTML = `
        <div class="cr-case-head">
          <div class="cr-case-meta">
            <span class="cr-year">${c.year}</span>
            <span class="cr-flag" aria-hidden="true">${getFlag(c)}</span>
            <span>${c.date[lang]}</span>
            <span>·</span>
            <span class="cr-app">App. no. ${c.appNo}</span>
          </div>
          <h2 class="cr-case-name" id="cr-case-name"><em>${getName(c)}</em> ${lang === 'no' ? 'mot' : 'v.'} ${getCountry(c)}</h2>
        </div>

        <div class="cr-section">
          <div class="cr-section-label"><svg class="icon"><use href="#i-shield"/></svg>${T.cr_label_holding}</div>
          <div class="cr-text">${c[lang].rettssats || ''}</div>
        </div>

        <div class="cr-section">
          <div class="cr-section-label"><svg class="icon"><use href="#i-list"/></svg>${T.cr_label_facts}</div>
          <div class="cr-text">${c[lang].facts || ''}</div>
        </div>

        <div class="cr-section">
          <div class="cr-section-label"><svg class="icon"><use href="#i-book-open"/></svg>${T.cr_label_quotes}</div>
          ${quotesHtml}
        </div>

        <div class="cr-section">
          <div class="cr-section-label"><svg class="icon"><use href="#i-grid"/></svg>${T.cr_label_principles}</div>
          <div class="cr-principles">${principleChips}</div>
        </div>

        <div class="cr-actions">
          <a class="cr-action cr-action-hudoc" href="${c.hudoc}" target="_blank" rel="noopener">
            <svg class="icon"><use href="#i-external"/></svg>${T.cr_action_hudoc}
          </a>
          <button class="cr-action cr-action-copy" data-case-id="${c.id}" type="button">
            <svg class="icon"><use href="#i-list"/></svg>${T.cr_action_copy}
          </button>
        </div>
      `;

      // Wire principle tags in modal
      body.querySelectorAll('.cr-principle-tag').forEach(btn => {
        btn.addEventListener('click', () => {
          openObligationModal(btn.dataset.obligation);
        });
      });

      // Wire copy citation in modal
      const copyBtn = body.querySelector('.cr-action-copy');
      copyBtn.addEventListener('click', () => {
        const fullName = `${getName(c)} v. ${getCountry(c)}`;
        const citation = `${fullName}, app. no. ${c.appNo}, ECHR ${c.date[lang]}. Available at ${c.hudoc}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(citation).then(() => {
            copyBtn.classList.add('done');
            showToast(T.copy_done + ' · ' + fullName);
            setTimeout(() => copyBtn.classList.remove('done'), 2200);
          });
        }
      });

      const modal = document.getElementById('cr-modal');
      modal.hidden = false;
      document.body.style.overflow = 'hidden';
      // Scroll sheet to top
      document.querySelector('.cr-sheet').scrollTop = 0;
    }
    function closeCaseReader() {
      const modal = document.getElementById('cr-modal');
      modal.hidden = true;
      document.body.style.overflow = '';
    }
    function setupCaseReader() {
      const close = document.getElementById('cr-close');
      const backdrop = document.getElementById('cr-backdrop');
      if (close) close.addEventListener('click', closeCaseReader);
      if (backdrop) backdrop.addEventListener('click', closeCaseReader);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !document.getElementById('cr-modal').hidden) closeCaseReader();
      });
    }

    /* ============ OBLIGATION MODAL ============ */
    function openObligationModal(obligationId) {
      const o = obligations.find(x => x.id === obligationId);
      if (!o) return;
      const modal = document.getElementById('ob-modal');
      const lang = currentLang;
      const T = content[lang];

      document.getElementById('ob-modal-icon').innerHTML = `<svg class="icon"><use href="#${o.icon}"/></svg>`;
      document.getElementById('ob-modal-title').textContent = o[lang].title;
      document.getElementById('ob-modal-text').textContent = o[lang].body;

      const list = document.getElementById('ob-modal-actionables');
      list.innerHTML = (o[lang].actionables || []).map(a => `<li>${a}</li>`).join('');

      const casesEl = document.getElementById('ob-modal-cases');
      const matchingCases = cases.filter(c => c.principles && c.principles.includes(o.id));
      casesEl.innerHTML = `<strong>${T.modal_cases_label}</strong> ${matchingCases.map(c => getName(c)).join(' · ')}`;

      modal.hidden = false;
      document.body.style.overflow = 'hidden';
    }
    function closeObligationModal() {
      const modal = document.getElementById('ob-modal');
      modal.hidden = true;
      document.body.style.overflow = '';
    }
    function setupObligationModal() {
      const close = document.getElementById('ob-modal-close');
      const backdrop = document.getElementById('ob-modal-backdrop');
      if (close) close.addEventListener('click', closeObligationModal);
      if (backdrop) backdrop.addEventListener('click', closeObligationModal);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !document.getElementById('ob-modal').hidden) closeObligationModal();
      });
    }

    function renderHowto() {
      const grid = document.getElementById('howto-grid');
      if (!grid) return;
      const T = currentLang;
      const steps = T === 'no' ? [
        { num: '01', h: 'Identifiser plikten', p: 'Start i kapittel «Forpliktelsene» og finn hvilken positiv plikt din sak handler om — tid, aktiv inngripen, undersøkelse, ikke-avhengighet, eller rettslig arsenal.' },
        { num: '02', h: 'Finn relevante dommer', p: 'Bruk filter på plikttype, eller søk på stikkord, paragraf eller sitat. Du kan også filtrere etter saker mot Norge spesifikt.' },
        { num: '03', h: 'Sitér primærkilden', p: 'Hver dom har lenke til HUDOC. Sitér paragrafer og sjekk originalen. Håndboken hjelper deg å finne frem — den erstatter ikke domsteksten.' }
      ] : [
        { num: '01', h: 'Identify the obligation', p: 'Start in the "Obligations" chapter and identify which positive duty your case is about — time, active intervention, investigation, non-dependency, or legal arsenal.' },
        { num: '02', h: 'Find relevant judgments', p: 'Use the obligation-type filter, or search by keyword, paragraph or quote. You can also filter for cases against Norway specifically.' },
        { num: '03', h: 'Cite the primary source', p: 'Each judgment links to HUDOC. Cite paragraphs and check the original. The handbook helps you find your way — it does not replace the judgment text.' }
      ];
      grid.innerHTML = steps.map(s => `
        <div class="howto-step">
          <div class="ht-num">${s.num}</div>
          <h4>${s.h}</h4>
          <p>${s.p}</p>
        </div>
      `).join('');
    }

    function renderMetaCounts() {
      const a = document.getElementById('meta-cases');
      const b = document.getElementById('meta-obligations');
      const c = document.getElementById('meta-norway');
      if (a) a.textContent = cases.length;
      if (b) b.textContent = obligations.length;
      if (c) c.textContent = cases.filter(cc => cc.country === 'Norge' || cc.country === 'Norway').length;
    }

    function renderSuggestions() {
      const wrap = document.getElementById('search-suggestions');
      if (!wrap) return;
      const suggestions = currentLang === 'no'
        ? ['rettslig arsenal', 'barnets motvilje', 'uopprettelige følger', 'koordinerte tiltak']
        : ['legal arsenal', 'child resistance', 'irremediable consequences', 'coordinated measures'];
      const label = currentLang === 'no' ? 'Prøv' : 'Try';
      wrap.innerHTML = `<span class="ss-label">${label}</span>` + suggestions.map(s =>
        `<button class="ss-chip" type="button" data-q="${s}">${s}</button>`
      ).join('');
      wrap.querySelectorAll('.ss-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const input = document.getElementById('db-search');
          input.value = chip.dataset.q;
          searchTerm = chip.dataset.q;
          renderCases();
          input.focus();
        });
      });
    }

    /* ============ I18N ============ */
    function setLang(lang) {
      if (!content[lang]) lang = 'no';
      currentLang = lang;
      document.documentElement.lang = lang === 'no' ? 'no' : 'en';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (content[lang][key] !== undefined) el.innerHTML = content[lang][key];
      });

      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        const active = btn.dataset.lang === lang;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      const searchInput = document.getElementById('db-search');
      if (searchInput) searchInput.placeholder = content[lang].db_search_placeholder || '';

      renderObligations();
      renderFilters();
      renderHowto();
      renderSuggestions();
      renderCases();
      renderMetaCounts();

      localStorage.setItem('handbook-lang', lang);
    }

    /* ============ INIT ============ */
    (function init() {
      const saved = localStorage.getItem('handbook-lang') || localStorage.getItem('lang');
      const browser = (navigator.language || 'en').toLowerCase();
      const isNorwegian = browser.startsWith('no') || browser.startsWith('nb') || browser.startsWith('nn');
      const initialLang = saved || (isNorwegian ? 'no' : 'en');

      setLang(initialLang);

      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });

      setupObligationModal();
      setupCaseReader();

      const searchInput = document.getElementById('db-search');
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderCases();
      });

      // "/" focuses search; Esc clears
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        } else if (e.key === 'Escape' && document.activeElement === searchInput) {
          if (searchInput.value) {
            searchInput.value = '';
            searchTerm = '';
            renderCases();
          } else {
            searchInput.blur();
          }
        }
      });
    })();
  </script>
</body>
</html>
